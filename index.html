<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍂 Leaf Game v6</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-dark: #0a0f0a;
  --bg-panel: #111a11;
  --bg-card: #1a2a1a;
  --bg-card-hover: #1f331f;
  --green-1: #2d5a2d;
  --green-2: #3a7a3a;
  --green-3: #4a9a4a;
  --green-bright: #6fdc6f;
  --green-glow: #3aff3a;
  --gold: #ffd700;
  --gold-dark: #b8960f;
  --text: #e0e8e0;
  --text-dim: #8a9a8a;
  --text-bright: #ffffff;
  --danger: #ff4444;
  --blue: #4488ff;
  --purple: #aa66ff;
  --orange: #ff8844;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-dark);
  color: var(--text);
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

/* ===== LAYOUT ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  width: 100%;
  max-width: 100vw;
  overflow: hidden;
}

#top-bar {
  flex-shrink: 0;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--green-1);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
  min-height: 56px;
}

#leaf-counter {
  font-size: 1.6em;
  font-weight: 700;
  color: var(--green-bright);
  text-shadow: 0 0 12px rgba(106, 220, 106, 0.4);
  transition: transform 0.1s;
  white-space: nowrap;
}

#leaf-counter.pulse {
  transform: scale(1.08);
}

#lps-display {
  font-size: 0.85em;
  color: var(--text-dim);
  margin-top: 2px;
}

#next-unlock {
  font-size: 0.75em;
  color: var(--gold);
  text-align: right;
  max-width: 45%;
  line-height: 1.3;
}

#main-area {
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* Panels */
.panel {
  display: none;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px;
  padding-bottom: 70px;
  -webkit-overflow-scrolling: touch;
}

.panel.active {
  display: block;
}

#panel-click {
  display: none;
  height: 100%;
  position: relative;
  overflow: hidden;
}

#panel-click.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Bottom Nav */
#bottom-nav {
  flex-shrink: 0;
  display: flex;
  background: var(--bg-panel);
  border-top: 1px solid var(--green-1);
  z-index: 100;
}

.nav-btn {
  flex: 1;
  min-height: 52px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 0.72em;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: color 0.2s, background 0.2s;
  padding: 4px 2px;
}

.nav-btn.active {
  color: var(--green-bright);
  background: rgba(106, 220, 106, 0.08);
}

.nav-btn .nav-icon { font-size: 1.4em; }

/* ===== CLICK AREA ===== */
#click-target {
  width: min(200px, 50vw);
  height: min(200px, 50vw);
  border-radius: 50%;
  background: radial-gradient(circle, var(--green-2), var(--green-1));
  border: 3px solid var(--green-3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: min(80px, 20vw);
  transition: transform 0.08s, box-shadow 0.08s;
  box-shadow: 0 0 30px rgba(106, 220, 106, 0.2);
  position: relative;
  z-index: 10;
}

#click-target:active {
  transform: scale(0.93);
  box-shadow: 0 0 50px rgba(106, 220, 106, 0.5);
}

#click-power-label {
  font-size: 0.85em;
  color: var(--text-dim);
  margin-top: 12px;
}

/* Floating numbers */
.float-number {
  position: absolute;
  color: var(--green-bright);
  font-weight: 700;
  font-size: 1.2em;
  pointer-events: none;
  z-index: 50;
  animation: floatUp 1s ease-out forwards;
  text-shadow: 0 0 6px rgba(106, 220, 106, 0.6);
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(0.6); }
}

/* Falling leaves background */
.falling-leaf {
  position: absolute;
  font-size: 1.2em;
  opacity: 0.3;
  pointer-events: none;
  z-index: 1;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 0.35; }
  100% { transform: translateY(calc(100vh + 20px)) rotate(720deg); opacity: 0; }
}

/* ===== GENERATORS ===== */
.gen-card {
  background: var(--bg-card);
  border: 1px solid var(--green-1);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: border-color 0.2s;
}

.gen-card.locked {
  opacity: 0.4;
  pointer-events: none;
}

.gen-card.affordable {
  border-color: var(--green-3);
}

.gen-icon {
  font-size: 2em;
  width: 48px;
  text-align: center;
  flex-shrink: 0;
}

.gen-info {
  flex: 1;
  min-width: 0;
}

.gen-name {
  font-weight: 700;
  font-size: 0.95em;
  color: var(--text-bright);
}

.gen-detail {
  font-size: 0.75em;
  color: var(--text-dim);
  margin-top: 2px;
}

.gen-buy-btn {
  min-width: 80px;
  min-height: 44px;
  border: none;
  border-radius: 8px;
  background: var(--green-1);
  color: var(--text);
  font-weight: 700;
  font-size: 0.82em;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  padding: 6px 10px;
  text-align: center;
  line-height: 1.3;
}

.gen-buy-btn.can-afford {
  background: var(--green-2);
}

.gen-buy-btn.can-afford:active {
  transform: scale(0.95);
  background: var(--green-3);
}

/* ===== UPGRADES ===== */
.upgrade-card {
  background: var(--bg-card);
  border: 1px solid var(--green-1);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.2s, opacity 0.3s;
}

.upgrade-card.purchased {
  opacity: 0.5;
  pointer-events: none;
  border-color: var(--green-3);
}

.upgrade-card.affordable {
  border-color: var(--gold-dark);
}

.upgrade-card.cooldown {
  border-color: var(--blue);
}

.upgrade-name {
  font-weight: 700;
  font-size: 0.95em;
  color: var(--gold);
}

.upgrade-desc {
  font-size: 0.78em;
  color: var(--text-dim);
  margin-top: 4px;
}

.upgrade-cost {
  font-size: 0.82em;
  color: var(--green-bright);
  margin-top: 6px;
  font-weight: 600;
}

/* ===== PRESTIGE ===== */
#panel-prestige {
  text-align: center;
  display: none;
  padding-top: 40px;
}

#panel-prestige.active { display: block; }

.prestige-info {
  margin: 20px auto;
  max-width: 360px;
}

.prestige-info h2 {
  color: var(--purple);
  font-size: 1.5em;
  margin-bottom: 10px;
}

.prestige-info p {
  color: var(--text-dim);
  font-size: 0.9em;
  line-height: 1.5;
  margin-bottom: 10px;
}

.prestige-btn {
  min-height: 54px;
  min-width: 200px;
  border: 2px solid var(--purple);
  border-radius: 12px;
  background: rgba(170, 102, 255, 0.1);
  color: var(--purple);
  font-weight: 700;
  font-size: 1.1em;
  cursor: pointer;
  margin: 20px auto;
  padding: 12px 24px;
  transition: all 0.3s;
}

.prestige-btn:disabled {
  opacity: 0.4;
  cursor: default;
}

.prestige-btn:not(:disabled) {
  animation: prestigeGlow 2s ease-in-out infinite;
}

@keyframes prestigeGlow {
  0%, 100% { box-shadow: 0 0 10px rgba(170, 102, 255, 0.3); }
  50% { box-shadow: 0 0 30px rgba(170, 102, 255, 0.6); }
}

.essence-upgrade {
  background: var(--bg-card);
  border: 1px solid var(--purple);
  border-radius: 10px;
  padding: 12px;
  margin: 8px auto;
  max-width: 360px;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.2s;
}

.essence-upgrade.purchased {
  opacity: 0.5;
  pointer-events: none;
}

.essence-upgrade-name {
  color: var(--purple);
  font-weight: 700;
}

.essence-upgrade-desc {
  color: var(--text-dim);
  font-size: 0.8em;
  margin-top: 4px;
}

.essence-upgrade-cost {
  color: var(--purple);
  font-size: 0.85em;
  font-weight: 600;
  margin-top: 6px;
}

/* ===== STATS ===== */
#panel-stats .stat-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 4px;
  border-bottom: 1px solid rgba(106, 220, 106, 0.1);
  font-size: 0.9em;
}

.stat-label { color: var(--text-dim); }
.stat-value { color: var(--text-bright); font-weight: 600; }

.stats-section-title {
  color: var(--green-bright);
  font-weight: 700;
  font-size: 1em;
  margin: 16px 0 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--green-1);
}

.danger-btn {
  min-height: 44px;
  border: 1px solid var(--danger);
  border-radius: 8px;
  background: transparent;
  color: var(--danger);
  font-weight: 600;
  font-size: 0.85em;
  cursor: pointer;
  padding: 10px 20px;
  margin-top: 20px;
  width: 100%;
}

/* ===== EVENT BANNER ===== */
#event-banner {
  display: none;
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 215, 0, 0.15);
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 8px 16px;
  color: var(--gold);
  font-weight: 700;
  font-size: 0.85em;
  z-index: 90;
  text-align: center;
  max-width: 90%;
  animation: bannerPulse 1s ease-in-out infinite;
}

@keyframes bannerPulse {
  0%, 100% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.2); }
  50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
}

/* Golden Leaf */
#golden-leaf {
  display: none;
  position: absolute;
  font-size: 3em;
  cursor: pointer;
  z-index: 80;
  animation: goldenSpin 2s linear infinite;
  filter: drop-shadow(0 0 10px gold);
}

@keyframes goldenSpin {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.2); }
  100% { transform: rotate(360deg) scale(1); }
}

/* ===== MILESTONE TOAST ===== */
#milestone-toast {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.9);
  border: 2px solid var(--gold);
  border-radius: 16px;
  padding: 24px 32px;
  z-index: 200;
  text-align: center;
  animation: toastIn 0.3s ease-out;
}

@keyframes toastIn {
  from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

#milestone-toast .toast-title {
  color: var(--gold);
  font-size: 1.3em;
  font-weight: 700;
  margin-bottom: 8px;
}

#milestone-toast .toast-desc {
  color: var(--text);
  font-size: 0.9em;
}

/* ===== OFFLINE MODAL ===== */
#offline-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 300;
  align-items: center;
  justify-content: center;
}

#offline-modal.show {
  display: flex;
}

.offline-box {
  background: var(--bg-panel);
  border: 2px solid var(--green-2);
  border-radius: 16px;
  padding: 30px;
  text-align: center;
  max-width: 340px;
  margin: 20px;
}

.offline-box h2 {
  color: var(--green-bright);
  margin-bottom: 12px;
}

.offline-box p {
  color: var(--text);
  font-size: 0.95em;
  margin-bottom: 8px;
}

.offline-box .earned {
  color: var(--gold);
  font-size: 1.4em;
  font-weight: 700;
  margin: 12px 0;
}

.offline-box button {
  min-height: 44px;
  min-width: 120px;
  border: none;
  border-radius: 8px;
  background: var(--green-2);
  color: var(--text-bright);
  font-weight: 700;
  font-size: 1em;
  cursor: pointer;
  margin-top: 12px;
}

/* ===== VISUAL BACKGROUND ===== */
#bg-scene {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 0;
  pointer-events: none;
  transition: background 2s;
}

/* ===== SCROLLBAR ===== */
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: var(--green-1); border-radius: 4px; }

/* ===== MILESTONE BADGES ===== */
.milestone-badge {
  display: inline-block;
  background: var(--gold);
  color: #000;
  font-size: 0.65em;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
  margin-left: 6px;
  vertical-align: middle;
}

/* Buy amount selector */
#buy-amount-bar {
  display: flex;
  gap: 4px;
  padding: 8px 12px 4px;
}

.buy-amt-btn {
  flex: 1;
  min-height: 36px;
  border: 1px solid var(--green-1);
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  font-weight: 600;
  font-size: 0.8em;
  cursor: pointer;
}

.buy-amt-btn.active {
  background: var(--green-1);
  color: var(--text-bright);
  border-color: var(--green-3);
}
</style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div id="top-bar">
    <div>
      <div id="leaf-counter">🍂 0 Leaves</div>
      <div id="lps-display">0 leaves/sec</div>
    </div>
    <div id="next-unlock"></div>
  </div>

  <!-- MAIN AREA -->
  <div id="main-area">
    <div id="bg-scene"></div>
    <div id="event-banner"></div>
    <div id="golden-leaf" onclick="Game.clickGoldenLeaf()">🍂</div>

    <!-- Click Panel -->
    <div id="panel-click" class="active">
      <div id="click-target" onclick="Game.manualClick(event)">🍃</div>
      <div id="click-power-label">+1 per click</div>
    </div>

    <!-- Generators Panel -->
    <div id="panel-generators" class="panel">
      <div id="buy-amount-bar">
        <button class="buy-amt-btn active" onclick="Game.setBuyAmount(1)">×1</button>
        <button class="buy-amt-btn" onclick="Game.setBuyAmount(10)">×10</button>
        <button class="buy-amt-btn" onclick="Game.setBuyAmount(100)">×100</button>
        <button class="buy-amt-btn" onclick="Game.setBuyAmount(-1)">Max</button>
      </div>
      <div id="gen-list"></div>
    </div>

    <!-- Upgrades Panel -->
    <div id="panel-upgrades" class="panel">
      <div id="upgrade-list"></div>
    </div>

    <!-- Prestige Panel -->
    <div id="panel-prestige" class="panel">
      <div class="prestige-info">
        <h2>🌿 Nature's Reset</h2>
        <div id="essence-display"></div>
        <p>Reset your forest to earn <strong style="color:var(--purple)">Nature Essence</strong> — a permanent currency that persists across resets.</p>
        <p id="prestige-gain-text"></p>
        <button class="prestige-btn" id="prestige-btn" onclick="Game.prestige()" disabled>Reset Forest</button>
      </div>
      <div class="stats-section-title" style="max-width:360px;margin-left:auto;margin-right:auto;">Essence Upgrades</div>
      <div id="essence-upgrades-list"></div>
    </div>

    <!-- Stats Panel -->
    <div id="panel-stats" class="panel">
      <div class="stats-section-title">Production</div>
      <div id="stats-production"></div>
      <div class="stats-section-title">Totals</div>
      <div id="stats-totals"></div>
      <div class="stats-section-title">Milestones</div>
      <div id="stats-milestones"></div>
      <div class="stats-section-title">Prestige</div>
      <div id="stats-prestige"></div>
      <div class="stats-section-title">Danger Zone</div>
      <button class="danger-btn" onclick="Game.hardReset()">🗑️ Hard Reset (Delete Everything)</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <button class="nav-btn active" onclick="Game.switchPanel('click')" data-panel="click">
      <span class="nav-icon">👆</span>Click
    </button>
    <button class="nav-btn" onclick="Game.switchPanel('generators')" data-panel="generators">
      <span class="nav-icon">🌱</span>Generators
    </button>
    <button class="nav-btn" onclick="Game.switchPanel('upgrades')" data-panel="upgrades">
      <span class="nav-icon">⬆️</span>Upgrades
    </button>
    <button class="nav-btn" onclick="Game.switchPanel('prestige')" data-panel="prestige">
      <span class="nav-icon">✨</span>Prestige
    </button>
    <button class="nav-btn" onclick="Game.switchPanel('stats')" data-panel="stats">
      <span class="nav-icon">📊</span>Stats
    </button>
  </div>
</div>

<!-- Milestone Toast -->
<div id="milestone-toast">
  <div class="toast-title"></div>
  <div class="toast-desc"></div>
</div>

<!-- Offline Modal -->
<div id="offline-modal">
  <div class="offline-box">
    <h2>🌙 Welcome Back!</h2>
    <p>While you were away, your forest generated:</p>
    <div class="earned" id="offline-earned"></div>
    <p id="offline-time"></p>
    <button onclick="Game.dismissOffline()">Collect!</button>
  </div>
</div>

<script>
// ===== SOUND ENGINE =====
const Sound = {
  ctx: null,
  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  },
  play(type) {
    if (!this.ctx) return;
    try {
      const now = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      if (type === 'click') {
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(400, now + 0.08);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      } else if (type === 'buy') {
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.06);
        osc.frequency.setValueAtTime(784, now + 0.12);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      } else if (type === 'milestone') {
        const osc2 = this.ctx.createOscillator();
        const gain2 = this.ctx.createGain();
        osc2.connect(gain2); gain2.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.15);
        osc.frequency.setValueAtTime(784, now + 0.3);
        gain.gain.setValueAtTime(0.12, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(1047, now + 0.35);
        gain2.gain.setValueAtTime(0.08, now + 0.35);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
        osc2.start(now + 0.35); osc2.stop(now + 0.7);
      } else if (type === 'prestige') {
        [523, 659, 784, 1047].forEach((f, i) => {
          const o = this.ctx.createOscillator();
          const g = this.ctx.createGain();
          o.type = 'sine';
          o.connect(g); g.connect(this.ctx.destination);
          o.frequency.setValueAtTime(f, now + i * 0.15);
          g.gain.setValueAtTime(0.1, now + i * 0.15);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.4);
          o.start(now + i * 0.15); o.stop(now + i * 0.15 + 0.4);
        });
      }
    } catch(e) {}
  }
};

// ===== NUMBER FORMATTING =====
function fmt(n) {
  if (n < 0) return '-' + fmt(-n);
  if (n < 1000) return Math.floor(n).toLocaleString();
  const suffixes = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp', 'Oc', 'No', 'Dc'];
  const tier = Math.floor(Math.log10(Math.abs(n)) / 3);
  if (tier === 0) return Math.floor(n).toLocaleString();
  if (tier < suffixes.length) {
    const scale = Math.pow(10, tier * 3);
    const scaled = n / scale;
    return (scaled < 10 ? scaled.toFixed(2) : scaled < 100 ? scaled.toFixed(1) : scaled.toFixed(0)) + suffixes[tier];
  }
  return n.toExponential(2);
}

function fmtTime(seconds) {
  if (seconds < 60) return Math.floor(seconds) + 's';
  if (seconds < 3600) return Math.floor(seconds / 60) + 'm ' + Math.floor(seconds % 60) + 's';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  return h + 'h ' + m + 'm';
}

// ===== GAME =====
const Game = {
  // State
  leaves: 0,
  totalLeaves: 0,
  totalLeavesAllTime: 0,
  totalClicks: 0,
  clickPower: 1,
  buyAmount: 1,
  activePanel: 'click',
  startTime: Date.now(),
  lastTick: Date.now(),
  lastSave: Date.now(),
  lastEventCheck: Date.now(),
  nextEventTime: 0,
  activeEvent: null,
  eventEndTime: 0,
  toastTimeout: null,

  // Prestige
  natureEssence: 0,
  totalPrestiges: 0,
  essenceUpgradesBought: [],

  // Milestones achieved
  milestonesAchieved: [],

  // Generators: id, name, icon, baseCost, baseProduction, producesIndex (-1 = leaves), count, unlockCost
  generators: [
    { id: 'sapling',  name: 'Sapling',      icon: '🌱', baseCost: 10,      baseProduction: 1,    count: 0, unlockAt: 0 },
    { id: 'tree',     name: 'Tree',          icon: '🌳', baseCost: 150,     baseProduction: 0.2,  count: 0, unlockAt: 10 },
    { id: 'forest',   name: 'Forest',        icon: '🌲', baseCost: 5000,    baseProduction: 0.05, count: 0, unlockAt: 150 },
    { id: 'grove',    name: 'Ancient Grove',  icon: '🏔️', baseCost: 200000,  baseProduction: 0.01, count: 0, unlockAt: 5000 },
  ],

  // Upgrades
  upgrades: [
    { id: 'photo',     name: 'Photosynthesis Boost', desc: 'All plant production ×3',                   cost: 500,    bought: false, type: 'multiplier' },
    { id: 'wind',      name: 'Wind Gust',            desc: 'Click power ×5',                             cost: 2000,   bought: false, type: 'click' },
    { id: 'harmony',   name: 'Forest Harmony',       desc: 'Each tree doubles sapling output',           cost: 10000,  bought: false, type: 'synergy' },
    { id: 'surge',     name: 'Autumn Surge',         desc: '30s of ×10 production (5min cooldown)',      cost: 5000,   bought: false, type: 'active', cooldownEnd: 0, activeEnd: 0 },
    { id: 'sunlight',  name: 'Sunlight Blessing',    desc: 'All production ×10',                         cost: 1e6,    bought: false, type: 'multiplier' },
    { id: 'ancient',   name: 'Ancient Forest',       desc: 'All production ×50',                         cost: 1e9,    bought: false, type: 'multiplier' },
  ],

  // Essence Upgrades
  essenceUpgrades: [
    { id: 'e_speed',   name: 'Swift Growth',       desc: 'Start with 5 free saplings each run',  cost: 5 },
    { id: 'e_multi2',  name: 'Essence Multiplier',  desc: 'All production ×2 permanently',         cost: 10 },
    { id: 'e_click',   name: 'Essence Click',       desc: 'Click power ×3 permanently',            cost: 8 },
    { id: 'e_cheap',   name: 'Bargain Roots',       desc: 'All generators 15% cheaper',            cost: 15 },
    { id: 'e_multi5',  name: 'Deep Roots',          desc: 'All production ×5 permanently',         cost: 50 },
    { id: 'e_offline', name: 'Dream Harvest',       desc: 'Offline cap → 24 hours',                cost: 20 },
  ],

  // Milestones
  milestones: [
    { id: 'm_sap10',    check: () => Game.generators[0].count >= 10,  name: '10 Saplings',     desc: 'Saplings ×2 speed',         reward: 'sapling_x2' },
    { id: 'm_tree25',   check: () => Game.generators[1].count >= 25,  name: '25 Trees',        desc: 'Weather events unlocked',   reward: 'weather' },
    { id: 'm_for50',    check: () => Game.generators[2].count >= 50,  name: '50 Forests',      desc: 'All production +300%',      reward: 'prod_x4' },
    { id: 'm_any100',   check: () => Game.generators.some(g => g.count >= 100), name: '100 of any tier', desc: 'Visual upgrade!', reward: 'visual' },
    { id: 'm_1m',       check: () => Game.totalLeavesAllTime >= 1e6,  name: '1M Total Leaves', desc: 'Click power ×2',            reward: 'click_x2' },
    { id: 'm_1b',       check: () => Game.totalLeavesAllTime >= 1e9,  name: '1B Total Leaves', desc: 'All production ×2',         reward: 'prod_x2' },
  ],

  // Events
  events: [
    { id: 'golden',   name: '🍂 Golden Leaf!',     desc: 'Click the golden leaf for a massive bonus!', duration: 20 },
    { id: 'windstorm', name: '🌪️ Windstorm!',       desc: 'Leaf production ×20!',                       duration: 25 },
    { id: 'sunburst',  name: '☀️ Sunlight Burst!',   desc: 'All production ×10!',                        duration: 20 },
    { id: 'rain',      name: '🌧️ Rain Shower!',      desc: 'Production ×5 for 30 seconds!',              duration: 30 },
  ],

  // ===== INIT =====
  init() {
    this.load();
    this.scheduleNextEvent();
    this.renderGenerators();
    this.renderUpgrades();
    this.renderEssenceUpgrades();
    this.updateDisplay();
    this.startFallingLeaves();

    // Game loop
    setInterval(() => this.tick(), 50);
    // Save loop
    setInterval(() => this.save(), 30000);
    // Falling leaves
    setInterval(() => this.spawnFallingLeaf(), 2000);

    // Sound init on first interaction
    document.addEventListener('pointerdown', () => Sound.init(), { once: true });
  },

  // ===== TICK =====
  tick() {
    const now = Date.now();
    const dt = (now - this.lastTick) / 1000;
    this.lastTick = now;

    // Production
    const lps = this.getLPS();
    if (lps > 0) {
      const earned = lps * dt;
      this.leaves += earned;
      this.totalLeaves += earned;
      this.totalLeavesAllTime += earned;
    }

    // Tier production (trees produce saplings, forests produce trees, groves produce forests)
    for (let i = this.generators.length - 1; i >= 1; i--) {
      const gen = this.generators[i];
      if (gen.count > 0) {
        const prod = this.getGeneratorTierProduction(i);
        this.generators[i - 1].count += prod * dt;
      }
    }

    // Check surge
    const surge = this.upgrades.find(u => u.id === 'surge');
    if (surge.activeEnd && now > surge.activeEnd) {
      surge.activeEnd = 0;
    }

    // Check event
    if (this.activeEvent && now > this.eventEndTime) {
      this.endEvent();
    }

    // Trigger event
    if (!this.activeEvent && now > this.nextEventTime && this.milestonesAchieved.includes('m_tree25')) {
      this.triggerRandomEvent();
    }

    // Check milestones
    this.checkMilestones();

    // Update display
    this.updateDisplay();
  },

  // ===== PRODUCTION CALCULATIONS =====
  getLPS() {
    // Saplings produce leaves
    const sapCount = this.generators[0].count;
    if (sapCount <= 0) return 0;

    let baseProd = sapCount * this.generators[0].baseProduction;

    // Apply multipliers
    baseProd *= this.getProductionMultiplier();

    // Sapling-specific multipliers
    if (this.milestonesAchieved.includes('m_sap10')) baseProd *= 2;

    // Forest Harmony: each tree doubles sapling output
    if (this.upgrades.find(u => u.id === 'harmony').bought) {
      baseProd *= Math.pow(2, Math.floor(this.generators[1].count));
      // Cap at reasonable level to prevent Infinity
      if (baseProd > 1e30) baseProd = 1e30;
    }

    return baseProd;
  },

  getGeneratorTierProduction(tierIndex) {
    // How many of tier (tierIndex-1) does one of tier tierIndex produce per second
    const gen = this.generators[tierIndex];
    let prod = gen.count * gen.baseProduction;
    prod *= this.getProductionMultiplier();
    return prod;
  },

  getProductionMultiplier() {
    let mult = 1;

    // Upgrades
    if (this.upgrades.find(u => u.id === 'photo').bought) mult *= 3;
    if (this.upgrades.find(u => u.id === 'sunlight').bought) mult *= 10;
    if (this.upgrades.find(u => u.id === 'ancient').bought) mult *= 50;

    // Surge active
    const surge = this.upgrades.find(u => u.id === 'surge');
    if (surge.activeEnd && Date.now() < surge.activeEnd) mult *= 10;

    // Milestones
    if (this.milestonesAchieved.includes('m_for50')) mult *= 4;
    if (this.milestonesAchieved.includes('m_1b')) mult *= 2;

    // Active event
    if (this.activeEvent) {
      if (this.activeEvent.id === 'windstorm') mult *= 20;
      if (this.activeEvent.id === 'sunburst') mult *= 10;
      if (this.activeEvent.id === 'rain') mult *= 5;
    }

    // Essence permanent upgrades
    if (this.essenceUpgradesBought.includes('e_multi2')) mult *= 2;
    if (this.essenceUpgradesBought.includes('e_multi5')) mult *= 5;

    return mult;
  },

  getClickPower() {
    let power = 1;
    if (this.upgrades.find(u => u.id === 'wind').bought) power *= 5;
    if (this.milestonesAchieved.includes('m_1m')) power *= 2;
    if (this.essenceUpgradesBought.includes('e_click')) power *= 3;

    // Scale click power with production so it stays relevant
    const lps = this.getLPS();
    if (lps > 10) power += Math.floor(lps * 0.05);

    return Math.max(1, Math.floor(power));
  },

  getGeneratorCost(index, amount) {
    const gen = this.generators[index];
    let baseCost = gen.baseCost;
    if (this.essenceUpgradesBought.includes('e_cheap')) baseCost *= 0.85;

    if (amount === 1) {
      return Math.ceil(baseCost * Math.pow(1.15, gen.count));
    }

    // Total cost for buying 'amount'
    let total = 0;
    for (let i = 0; i < amount; i++) {
      total += Math.ceil(baseCost * Math.pow(1.15, gen.count + i));
    }
    return total;
  },

  getMaxAffordable(index) {
    const gen = this.generators[index];
    let baseCost = gen.baseCost;
    if (this.essenceUpgradesBought.includes('e_cheap')) baseCost *= 0.85;

    let count = 0;
    let total = 0;
    let budget = this.leaves;
    while (true) {
      const next = Math.ceil(baseCost * Math.pow(1.15, gen.count + count));
      if (total + next > budget) break;
      total += next;
      count++;
      if (count > 10000) break;
    }
    return { count, cost: total };
  },

  // ===== ACTIONS =====
  manualClick(event) {
    Sound.init();
    Sound.play('click');

    const power = this.getClickPower();
    this.leaves += power;
    this.totalLeaves += power;
    this.totalLeavesAllTime += power;
    this.totalClicks++;
    this.clickPower = power;

    // Floating number
    const rect = event.target.getBoundingClientRect();
    const x = (event.clientX || event.touches?.[0]?.clientX || rect.left + rect.width / 2);
    const y = (event.clientY || event.touches?.[0]?.clientY || rect.top);
    this.spawnFloatingNumber(x, y, '+' + fmt(power));

    // Pulse counter
    const counter = document.getElementById('leaf-counter');
    counter.classList.add('pulse');
    setTimeout(() => counter.classList.remove('pulse'), 100);
  },

  spawnFloatingNumber(x, y, text) {
    const el = document.createElement('div');
    el.className = 'float-number';
    el.textContent = text;
    el.style.left = (x + (Math.random() * 40 - 20)) + 'px';
    el.style.top = y + 'px';
    document.getElementById('main-area').appendChild(el);
    setTimeout(() => el.remove(), 1000);
  },

  buyGenerator(index) {
    const amount = this.buyAmount === -1 ? this.getMaxAffordable(index).count : this.buyAmount;
    if (amount <= 0) return;

    const cost = this.buyAmount === -1 ? this.getMaxAffordable(index).cost : this.getGeneratorCost(index, amount);
    if (this.leaves < cost) return;

    Sound.play('buy');
    this.leaves -= cost;
    this.generators[index].count += amount;
    this.renderGenerators();
  },

  buyUpgrade(index) {
    const upg = this.upgrades[index];
    if (upg.bought && upg.type !== 'active') return;

    if (upg.type === 'active') {
      // Surge: toggle active
      if (upg.bought) {
        const now = Date.now();
        if (upg.cooldownEnd && now < upg.cooldownEnd) return; // still on cooldown
        if (upg.activeEnd && now < upg.activeEnd) return; // already active
        // Activate
        upg.activeEnd = now + 30000;
        upg.cooldownEnd = now + 300000;
        Sound.play('buy');
        this.renderUpgrades();
        return;
      }
    }

    if (this.leaves < upg.cost) return;
    Sound.play('buy');
    this.leaves -= upg.cost;
    upg.bought = true;
    this.renderUpgrades();
  },

  // ===== EVENTS =====
  scheduleNextEvent() {
    // 5-15 minutes
    this.nextEventTime = Date.now() + (5 + Math.random() * 10) * 60 * 1000;
  },

  triggerRandomEvent() {
    const eventDef = this.events[Math.floor(Math.random() * this.events.length)];
    this.activeEvent = eventDef;
    this.eventEndTime = Date.now() + eventDef.duration * 1000;

    const banner = document.getElementById('event-banner');
    banner.textContent = eventDef.name + ' — ' + eventDef.desc;
    banner.style.display = 'block';

    if (eventDef.id === 'golden') {
      const gl = document.getElementById('golden-leaf');
      const mainArea = document.getElementById('main-area');
      gl.style.left = (30 + Math.random() * (mainArea.clientWidth - 80)) + 'px';
      gl.style.top = (60 + Math.random() * (mainArea.clientHeight - 160)) + 'px';
      gl.style.display = 'block';
    }
  },

  endEvent() {
    this.activeEvent = null;
    document.getElementById('event-banner').style.display = 'none';
    document.getElementById('golden-leaf').style.display = 'none';
    this.scheduleNextEvent();
  },

  clickGoldenLeaf() {
    if (!this.activeEvent || this.activeEvent.id !== 'golden') return;
    // Reward: 10 minutes worth of production or 1000, whichever is higher
    const reward = Math.max(this.getLPS() * 600, 1000);
    this.leaves += reward;
    this.totalLeaves += reward;
    this.totalLeavesAllTime += reward;
    Sound.play('milestone');
    this.showToast('🍂 Golden Leaf!', 'Collected ' + fmt(reward) + ' leaves!');
    this.endEvent();
  },

  // ===== MILESTONES =====
  checkMilestones() {
    for (const ms of this.milestones) {
      if (this.milestonesAchieved.includes(ms.id)) continue;
      if (ms.check()) {
        this.milestonesAchieved.push(ms.id);
        Sound.play('milestone');
        this.showToast('🏆 ' + ms.name, ms.desc);
      }
    }
  },

  showToast(title, desc) {
    const toast = document.getElementById('milestone-toast');
    toast.querySelector('.toast-title').textContent = title;
    toast.querySelector('.toast-desc').textContent = desc;
    toast.style.display = 'block';
    if (this.toastTimeout) clearTimeout(this.toastTimeout);
    this.toastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 3000);
  },

  // ===== PRESTIGE =====
  getPrestigeEssence() {
    // sqrt(totalLeaves / 1e9), minimum 1B total leaves to prestige
    if (this.totalLeaves < 1e9) return 0;
    return Math.floor(Math.sqrt(this.totalLeaves / 1e9));
  },

  prestige() {
    const gain = this.getPrestigeEssence();
    if (gain <= 0) return;

    Sound.play('prestige');
    this.natureEssence += gain;
    this.totalPrestiges++;

    // Reset run state
    this.leaves = 0;
    this.totalLeaves = 0;
    this.totalClicks = 0;
    this.generators.forEach(g => g.count = 0);
    this.upgrades.forEach(u => { u.bought = false; u.cooldownEnd = 0; u.activeEnd = 0; });
    this.milestonesAchieved = [];
    this.activeEvent = null;
    this.eventEndTime = 0;
    document.getElementById('event-banner').style.display = 'none';
    document.getElementById('golden-leaf').style.display = 'none';

    // Apply essence upgrades that give starting bonuses
    if (this.essenceUpgradesBought.includes('e_speed')) {
      this.generators[0].count = 5;
    }

    this.scheduleNextEvent();
    this.save();
    this.renderGenerators();
    this.renderUpgrades();
    this.renderEssenceUpgrades();
    this.showToast('✨ Forest Reset!', 'Earned ' + gain + ' Nature Essence');
    this.switchPanel('click');
  },

  buyEssenceUpgrade(id) {
    if (this.essenceUpgradesBought.includes(id)) return;
    const upg = this.essenceUpgrades.find(u => u.id === id);
    if (!upg || this.natureEssence < upg.cost) return;
    Sound.play('buy');
    this.natureEssence -= upg.cost;
    this.essenceUpgradesBought.push(id);
    this.renderEssenceUpgrades();
  },

  // ===== PANEL SWITCHING =====
  switchPanel(name) {
    this.activePanel = name;
    document.querySelectorAll('.panel, #panel-click').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.panel === name);
    });
    if (name === 'generators') this.renderGenerators();
    if (name === 'upgrades') this.renderUpgrades();
    if (name === 'prestige') this.renderEssenceUpgrades();
    if (name === 'stats') this.renderStats();
  },

  setBuyAmount(amt) {
    this.buyAmount = amt;
    document.querySelectorAll('.buy-amt-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    this.renderGenerators();
  },

  // ===== RENDERING =====
  renderGenerators() {
    const list = document.getElementById('gen-list');
    list.innerHTML = '';

    this.generators.forEach((gen, i) => {
      const cost = this.buyAmount === -1 ? this.getMaxAffordable(i) : { count: this.buyAmount, cost: this.getGeneratorCost(i, this.buyAmount) };
      const canAfford = this.leaves >= cost.cost && cost.count > 0;
      const unlocked = this.totalLeavesAllTime >= gen.unlockAt || gen.count > 0;

      const card = document.createElement('div');
      card.className = 'gen-card' + (unlocked ? '' : ' locked') + (canAfford ? ' affordable' : '');

      const prodRate = i === 0
        ? fmt(gen.count * gen.baseProduction * this.getProductionMultiplier() * (this.milestonesAchieved.includes('m_sap10') ? 2 : 1)) + ' leaves/s'
        : fmt(gen.count * gen.baseProduction * this.getProductionMultiplier()) + ' ' + this.generators[i-1].name.toLowerCase() + 's/s';

      card.innerHTML = `
        <div class="gen-icon">${gen.icon}</div>
        <div class="gen-info">
          <div class="gen-name">${gen.name} <span style="color:var(--green-bright)">(${fmt(Math.floor(gen.count))})</span></div>
          <div class="gen-detail">${unlocked ? prodRate : 'Unlock at ' + fmt(gen.unlockAt) + ' total leaves'}</div>
        </div>
        <button class="gen-buy-btn ${canAfford ? 'can-afford' : ''}" onclick="Game.buyGenerator(${i})" ${!canAfford || !unlocked ? '' : ''}>
          ${this.buyAmount === -1 ? 'Max (' + cost.count + ')' : '×' + this.buyAmount}<br>🍂 ${fmt(cost.cost)}
        </button>
      `;
      list.appendChild(card);
    });
  },

  renderUpgrades() {
    const list = document.getElementById('upgrade-list');
    list.innerHTML = '';

    this.upgrades.forEach((upg, i) => {
      const card = document.createElement('div');
      const now = Date.now();
      let statusText = '🍂 ' + fmt(upg.cost);
      let extraClass = '';

      if (upg.bought && upg.type !== 'active') {
        extraClass = 'purchased';
        statusText = '✅ Purchased';
      } else if (upg.type === 'active' && upg.bought) {
        if (upg.activeEnd && now < upg.activeEnd) {
          extraClass = 'cooldown';
          statusText = '⚡ Active: ' + Math.ceil((upg.activeEnd - now) / 1000) + 's';
        } else if (upg.cooldownEnd && now < upg.cooldownEnd) {
          extraClass = 'cooldown';
          statusText = '⏳ Cooldown: ' + fmtTime((upg.cooldownEnd - now) / 1000);
        } else {
          statusText = '🔄 Click to activate';
          extraClass = 'affordable';
        }
      } else if (this.leaves >= upg.cost) {
        extraClass = 'affordable';
      }

      card.className = 'upgrade-card ' + extraClass;
      card.innerHTML = `
        <div class="upgrade-name">${upg.name}</div>
        <div class="upgrade-desc">${upg.desc}</div>
        <div class="upgrade-cost">${statusText}</div>
      `;
      card.onclick = () => this.buyUpgrade(i);
      list.appendChild(card);
    });
  },

  renderEssenceUpgrades() {
    document.getElementById('essence-display').innerHTML = `
      <p style="font-size:1.2em;color:var(--purple);font-weight:700">✨ ${this.natureEssence} Nature Essence</p>
      <p style="font-size:0.85em;color:var(--text-dim)">Prestiges: ${this.totalPrestiges}</p>
    `;

    const gain = this.getPrestigeEssence();
    document.getElementById('prestige-gain-text').innerHTML = gain > 0
      ? `You will earn <strong style="color:var(--purple)">${gain} Nature Essence</strong> from this reset.`
      : `Need ${fmt(1e9)} total leaves this run to prestige. Current: ${fmt(this.totalLeaves)}`;

    document.getElementById('prestige-btn').disabled = gain <= 0;

    const list = document.getElementById('essence-upgrades-list');
    list.innerHTML = '';
    this.essenceUpgrades.forEach(upg => {
      const bought = this.essenceUpgradesBought.includes(upg.id);
      const canAfford = this.natureEssence >= upg.cost;
      const card = document.createElement('div');
      card.className = 'essence-upgrade' + (bought ? ' purchased' : '');
      card.innerHTML = `
        <div class="essence-upgrade-name">${upg.name} ${bought ? '✅' : ''}</div>
        <div class="essence-upgrade-desc">${upg.desc}</div>
        <div class="essence-upgrade-cost">${bought ? 'Purchased' : '✨ ' + upg.cost + ' Essence'}</div>
      `;
      if (!bought && canAfford) card.onclick = () => this.buyEssenceUpgrade(upg.id);
      list.appendChild(card);
    });
  },

  renderStats() {
    const lps = this.getLPS();

    document.getElementById('stats-production').innerHTML = `
      <div class="stat-row"><span class="stat-label">Leaves/sec</span><span class="stat-value">${fmt(lps)}</span></div>
      <div class="stat-row"><span class="stat-label">Click Power</span><span class="stat-value">${fmt(this.getClickPower())}</span></div>
      <div class="stat-row"><span class="stat-label">Production Multiplier</span><span class="stat-value">×${fmt(this.getProductionMultiplier())}</span></div>
    `;

    document.getElementById('stats-totals').innerHTML = `
      <div class="stat-row"><span class="stat-label">Current Leaves</span><span class="stat-value">${fmt(this.leaves)}</span></div>
      <div class="stat-row"><span class="stat-label">Total This Run</span><span class="stat-value">${fmt(this.totalLeaves)}</span></div>
      <div class="stat-row"><span class="stat-label">Total All Time</span><span class="stat-value">${fmt(this.totalLeavesAllTime)}</span></div>
      <div class="stat-row"><span class="stat-label">Total Clicks</span><span class="stat-value">${fmt(this.totalClicks)}</span></div>
      <div class="stat-row"><span class="stat-label">Play Time</span><span class="stat-value">${fmtTime((Date.now() - this.startTime) / 1000)}</span></div>
    `;

    document.getElementById('stats-milestones').innerHTML = this.milestones.map(ms => `
      <div class="stat-row">
        <span class="stat-label">${ms.name}</span>
        <span class="stat-value">${this.milestonesAchieved.includes(ms.id) ? '✅ ' + ms.desc : '🔒'}</span>
      </div>
    `).join('');

    document.getElementById('stats-prestige').innerHTML = `
      <div class="stat-row"><span class="stat-label">Nature Essence</span><span class="stat-value">✨ ${this.natureEssence}</span></div>
      <div class="stat-row"><span class="stat-label">Total Prestiges</span><span class="stat-value">${this.totalPrestiges}</span></div>
      <div class="stat-row"><span class="stat-label">Essence Upgrades</span><span class="stat-value">${this.essenceUpgradesBought.length}/${this.essenceUpgrades.length}</span></div>
    `;
  },

  updateDisplay() {
    // Leaf counter
    document.getElementById('leaf-counter').textContent = '🍂 ' + fmt(this.leaves) + ' Leaves';

    // LPS
    const lps = this.getLPS();
    document.getElementById('lps-display').textContent = fmt(lps) + ' leaves/sec';

    // Click power label
    document.getElementById('click-power-label').textContent = '+' + fmt(this.getClickPower()) + ' per click';

    // Next unlock
    this.updateNextUnlock();

    // Update background
    this.updateBackground();

    // Update active panel generator affordability
    if (this.activePanel === 'generators') {
      const btns = document.querySelectorAll('.gen-buy-btn');
      this.generators.forEach((gen, i) => {
        const cost = this.buyAmount === -1 ? this.getMaxAffordable(i) : { count: this.buyAmount, cost: this.getGeneratorCost(i, this.buyAmount) };
        const canAfford = this.leaves >= cost.cost && cost.count > 0;
        if (btns[i]) {
          btns[i].classList.toggle('can-afford', canAfford);
          btns[i].parentElement.classList.toggle('affordable', canAfford);
        }
      });
    }

    // Update upgrades surge timer
    if (this.activePanel === 'upgrades') {
      const surge = this.upgrades.find(u => u.id === 'surge');
      if (surge.bought) this.renderUpgrades();
    }
  },

  updateNextUnlock() {
    const el = document.getElementById('next-unlock');
    // Find next locked generator
    for (const gen of this.generators) {
      if (gen.count === 0 && this.totalLeavesAllTime < gen.unlockAt) {
        const pct = Math.min(100, (this.totalLeavesAllTime / gen.unlockAt * 100)).toFixed(0);
        el.innerHTML = `Next: <strong>${gen.name}</strong><br>${fmt(this.totalLeavesAllTime)} / ${fmt(gen.unlockAt)} (${pct}%)`;
        return;
      }
    }
    // Find next unpurchased upgrade
    for (const upg of this.upgrades) {
      if (!upg.bought) {
        const pct = Math.min(100, (this.leaves / upg.cost * 100)).toFixed(0);
        el.innerHTML = `Next: <strong>${upg.name}</strong><br>${fmt(this.leaves)} / ${fmt(upg.cost)} (${pct}%)`;
        return;
      }
    }
    // All done
    const gain = this.getPrestigeEssence();
    if (gain > 0) {
      el.innerHTML = `<strong>Prestige Available!</strong><br>+${gain} Nature Essence`;
    } else {
      el.innerHTML = `Goal: Prestige<br>${fmt(this.totalLeaves)} / ${fmt(1e9)}`;
    }
  },

  updateBackground() {
    const scene = document.getElementById('bg-scene');
    const totalGens = this.generators.reduce((s, g) => s + Math.floor(g.count), 0);

    let bg;
    if (totalGens >= 200) {
      bg = 'linear-gradient(180deg, #050a15 0%, #0a1a0a 30%, #0d2b0d 60%, #1a4a1a 100%)';
    } else if (totalGens >= 100) {
      bg = 'linear-gradient(180deg, #080e18 0%, #0c1e0c 40%, #153015 100%)';
    } else if (totalGens >= 50) {
      bg = 'linear-gradient(180deg, #0a0f14 0%, #0e1a0e 50%, #122512 100%)';
    } else if (totalGens >= 20) {
      bg = 'linear-gradient(180deg, #0a0f0a 0%, #0f1a0f 60%, #142014 100%)';
    } else if (totalGens >= 5) {
      bg = 'linear-gradient(180deg, #0a0e0a 0%, #0d150d 100%)';
    } else {
      bg = 'linear-gradient(180deg, #0a0f0a 0%, #0c0c0a 100%)';
    }
    scene.style.background = bg;
  },

  // ===== FALLING LEAVES =====
  startFallingLeaves() {
    for (let i = 0; i < 5; i++) {
      setTimeout(() => this.spawnFallingLeaf(), i * 400);
    }
  },

  spawnFallingLeaf() {
    const mainArea = document.getElementById('main-area');
    if (!mainArea) return;
    const leaf = document.createElement('div');
    leaf.className = 'falling-leaf';
    const leaves = ['🍂', '🍃', '🌿', '☘️'];
    leaf.textContent = leaves[Math.floor(Math.random() * leaves.length)];
    leaf.style.left = Math.random() * 100 + '%';
    leaf.style.animationDuration = (6 + Math.random() * 8) + 's';
    leaf.style.fontSize = (0.8 + Math.random() * 0.8) + 'em';
    mainArea.appendChild(leaf);
    setTimeout(() => leaf.remove(), 15000);
  },

  // ===== SAVE / LOAD =====
  save() {
    const data = {
      v: 6,
      leaves: this.leaves,
      totalLeaves: this.totalLeaves,
      totalLeavesAllTime: this.totalLeavesAllTime,
      totalClicks: this.totalClicks,
      generators: this.generators.map(g => ({ id: g.id, count: g.count })),
      upgrades: this.upgrades.map(u => ({ id: u.id, bought: u.bought, cooldownEnd: u.cooldownEnd || 0, activeEnd: u.activeEnd || 0 })),
      milestonesAchieved: this.milestonesAchieved,
      natureEssence: this.natureEssence,
      totalPrestiges: this.totalPrestiges,
      essenceUpgradesBought: this.essenceUpgradesBought,
      startTime: this.startTime,
      saveTime: Date.now()
    };
    try {
      localStorage.setItem('leafgame_v6', JSON.stringify(data));
    } catch(e) {}
  },

  load() {
    try {
      const raw = localStorage.getItem('leafgame_v6');
      if (!raw) return;
      const data = JSON.parse(raw);
      if (data.v !== 6) return;

      this.leaves = data.leaves || 0;
      this.totalLeaves = data.totalLeaves || 0;
      this.totalLeavesAllTime = data.totalLeavesAllTime || 0;
      this.totalClicks = data.totalClicks || 0;
      this.startTime = data.startTime || Date.now();
      this.natureEssence = data.natureEssence || 0;
      this.totalPrestiges = data.totalPrestiges || 0;
      this.essenceUpgradesBought = data.essenceUpgradesBought || [];
      this.milestonesAchieved = data.milestonesAchieved || [];

      if (data.generators) {
        data.generators.forEach(saved => {
          const gen = this.generators.find(g => g.id === saved.id);
          if (gen) gen.count = saved.count;
        });
      }

      if (data.upgrades) {
        data.upgrades.forEach(saved => {
          const upg = this.upgrades.find(u => u.id === saved.id);
          if (upg) {
            upg.bought = saved.bought;
            upg.cooldownEnd = saved.cooldownEnd || 0;
            upg.activeEnd = saved.activeEnd || 0;
          }
        });
      }

      // Calculate offline earnings
      if (data.saveTime) {
        const elapsed = (Date.now() - data.saveTime) / 1000;
        if (elapsed > 30) { // Only show for >30 seconds away
          const maxOffline = this.essenceUpgradesBought.includes('e_offline') ? 86400 : 43200; // 24h or 12h
          const cappedElapsed = Math.min(elapsed, maxOffline);
          const lps = this.getLPS();
          if (lps > 0) {
            // Also produce tier chains
            for (let t = this.generators.length - 1; t >= 1; t--) {
              const gen = this.generators[t];
              if (gen.count > 0) {
                const prod = gen.count * gen.baseProduction * this.getProductionMultiplier();
                this.generators[t - 1].count += prod * cappedElapsed;
              }
            }

            // Recalculate LPS with new counts
            const offlineEarnings = this.getLPS() * cappedElapsed;
            this.leaves += offlineEarnings;
            this.totalLeaves += offlineEarnings;
            this.totalLeavesAllTime += offlineEarnings;

            // Show offline modal
            document.getElementById('offline-earned').textContent = '🍂 ' + fmt(offlineEarnings) + ' Leaves';
            document.getElementById('offline-time').textContent = 'Time away: ' + fmtTime(elapsed);
            document.getElementById('offline-modal').classList.add('show');
          }
        }
      }
    } catch(e) {
      console.error('Failed to load save:', e);
    }
  },

  dismissOffline() {
    document.getElementById('offline-modal').classList.remove('show');
  },

  hardReset() {
    if (!confirm('This will DELETE ALL progress including prestige. Are you sure?')) return;
    if (!confirm('Really? This cannot be undone.')) return;
    localStorage.removeItem('leafgame_v6');
    location.reload();
  }
};

// ===== START =====
document.addEventListener('DOMContentLoaded', () => Game.init());

// Save on page hide
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') Game.save();
});
window.addEventListener('beforeunload', () => Game.save());
</script>
