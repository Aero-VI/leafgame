<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaf Life Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #000; cursor: pointer; }
canvas { display: block; }

#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; z-index: 10; }
#hud > * { pointer-events: auto; }

#sugar-display {
  font-size: 36px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,200,0,0.8), 2px 2px 4px rgba(0,0,0,0.5);
  display: flex; align-items: center; gap: 10px;
}
#sugar-display .icon { font-size: 28px; }
#sugar-per-sec { font-size: 14px; color: rgba(255,255,255,0.7); margin-left: 5px; }

/* Day/night arc */
#sky-arc {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%);
  width: 400px; height: 60px; z-index: 10; pointer-events: none;
}
#sky-arc-icon {
  position: absolute; font-size: 32px; transition: none;
  filter: drop-shadow(0 0 8px rgba(255,200,0,0.8));
}
#quota-display {
  position: fixed; top: 62px; left: 50%; transform: translateX(-50%);
  color: #fff; font-size: 14px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); z-index: 10;
}

#status-bar {
  position: fixed; top: 15px; right: 20px;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-end; z-index: 10;
}
.status-pill {
  padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
}
#season-pill { background: rgba(76,175,80,0.7); }
#weather-pill { background: rgba(33,150,243,0.7); }
#event-pill { background: rgba(255,152,0,0.7); display: none; }
#cycle-pill { background: rgba(156,39,176,0.5); font-size: 11px; }

#photo-btn {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 120px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.5);
  background: radial-gradient(circle, #66BB6A, #388E3C); color: #fff;
  font-size: 16px; font-weight: bold; cursor: pointer; z-index: 10;
  box-shadow: 0 0 30px rgba(76,175,80,0.5), inset 0 -4px 10px rgba(0,0,0,0.2);
  transition: transform 0.1s, box-shadow 0.1s; user-select: none;
}
#photo-btn:active { transform: translateX(-50%) scale(0.92); box-shadow: 0 0 15px rgba(76,175,80,0.8); }
#photo-btn:hover { box-shadow: 0 0 40px rgba(76,175,80,0.8), inset 0 -4px 10px rgba(0,0,0,0.2); }

.float-text {
  position: fixed; pointer-events: none; z-index: 20;
  font-size: 24px; font-weight: bold; color: #FFD700;
  text-shadow: 0 0 10px rgba(255,215,0,0.8), 2px 2px 4px rgba(0,0,0,0.5);
  animation: floatUp 1s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
}

#shop-btn, #skill-btn {
  position: fixed; bottom: 30px; z-index: 10;
  padding: 12px 20px; border-radius: 25px; border: 2px solid rgba(255,255,255,0.3);
  color: #fff; font-size: 14px; font-weight: bold; cursor: pointer;
  backdrop-filter: blur(10px); transition: all 0.2s;
}
#shop-btn { right: 30px; background: rgba(255,152,0,0.7); }
#skill-btn { left: 30px; background: rgba(156,39,176,0.7); }
#shop-btn:hover, #skill-btn:hover { transform: scale(1.05); }

#shop-panel, #skill-panel {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(20,20,30,0.95); border-radius: 20px; padding: 30px;
  border: 2px solid rgba(255,255,255,0.2); z-index: 100;
  backdrop-filter: blur(20px); display: none; min-width: 350px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
}
.panel-title { font-size: 24px; color: #fff; margin-bottom: 20px; text-align: center; }
.panel-close {
  position: absolute; top: 10px; right: 10px; color: #fff; font-size: 28px;
  cursor: pointer; opacity: 0.9; background: rgba(255,60,60,0.5); border: 2px solid rgba(255,255,255,0.4);
  width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  z-index: 110; line-height: 1; padding: 0;
}
.panel-close:hover { opacity: 1; background: rgba(255,60,60,0.8); }

.upgrade-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 15px; margin: 8px 0; border-radius: 12px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  transition: all 0.2s;
}
.upgrade-item:hover { background: rgba(255,255,255,0.1); }
.upgrade-name { color: #fff; font-weight: 600; }
.upgrade-desc { color: rgba(255,255,255,0.6); font-size: 12px; }
.upgrade-cost {
  padding: 6px 16px; border-radius: 15px; border: none;
  background: linear-gradient(135deg, #FFD700, #FFA000); color: #333;
  font-weight: bold; cursor: pointer; font-size: 13px; white-space: nowrap;
}
.upgrade-cost:hover { transform: scale(1.05); }
.upgrade-cost:disabled { opacity: 0.4; cursor: not-allowed; }
.upgrade-maxed { color: #4CAF50; font-size: 13px; font-weight: 600; }

.panel-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99;
}
#skill-panel { min-width: 600px; }
.skill-tree-container { position: relative; width: 540px; height: 480px; margin: 0 auto; }
.skill-node {
  position: absolute; width: 56px; height: 56px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s; font-size: 11px; font-weight: 600;
  text-align: center; color: #fff; line-height: 1.1; padding: 4px;
}
.skill-node.locked { background: rgba(100,100,100,0.6); border: 2px solid #666; }
.skill-node.available { background: rgba(255,200,0,0.3); border: 2px solid #FFD700; animation: pulse 2s infinite; }
.skill-node.unlocked { background: rgba(76,175,80,0.6); border: 2px solid #4CAF50; box-shadow: 0 0 15px rgba(76,175,80,0.5); }
@keyframes pulse { 0%,100% { box-shadow: 0 0 5px rgba(255,215,0,0.3); } 50% { box-shadow: 0 0 20px rgba(255,215,0,0.6); } }
.skill-node .cost { font-size: 9px; opacity: 0.8; display: block; }
.skill-branch-line {
  position: absolute; background: #555; z-index: -1;
}
.skill-branch-line.active { background: #4CAF50; box-shadow: 0 0 8px rgba(76,175,80,0.4); }
.branch-label { position: absolute; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 600; }

#game-over {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
}
#game-over h1 { font-size: 48px; color: #c62828; margin-bottom: 10px; text-shadow: 0 0 20px rgba(198,40,40,0.5); }
#game-over .stats { color: rgba(255,255,255,0.8); font-size: 16px; margin: 5px 0; }
#game-over .quote { color: rgba(255,255,255,0.5); font-style: italic; margin: 20px 0; font-size: 14px; max-width: 400px; text-align: center; }
#retry-btn {
  margin-top: 20px; padding: 15px 40px; border-radius: 30px; border: 2px solid #4CAF50;
  background: rgba(76,175,80,0.3); color: #fff; font-size: 18px; cursor: pointer;
  transition: all 0.3s;
}
#retry-btn:hover { background: rgba(76,175,80,0.6); transform: scale(1.05); }

/* Aphid minigame - screen overlay */
#aphid-overlay {
  position: fixed; inset: 0; z-index: 50; pointer-events: none; display: none;
}
#aphid-overlay.active { pointer-events: auto; display: block; }
#aphid-timer {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 72px; font-weight: bold; color: #ff4444; z-index: 55;
  text-shadow: 0 0 20px rgba(255,0,0,0.8), 2px 2px 4px rgba(0,0,0,0.8);
  pointer-events: none; display: none;
}
#aphid-count {
  position: fixed; top: 45%; left: 50%; transform: translate(-50%, -100%);
  font-size: 20px; color: #fff; z-index: 55; pointer-events: none; display: none;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
#aphid-result {
  position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
  font-size: 36px; font-weight: bold; z-index: 55; pointer-events: none; display: none;
  text-shadow: 0 0 15px currentColor, 2px 2px 4px rgba(0,0,0,0.8);
  animation: floatUp 1.5s ease-out forwards;
}
.aphid-sprite {
  position: fixed; z-index: 52; width: 44px; height: 44px; font-size: 32px;
  cursor: pointer; user-select: none; display: flex; align-items: center; justify-content: center;
  transition: transform 0.1s; pointer-events: auto; -webkit-tap-highlight-color: transparent;
}
.aphid-sprite:active { transform: scale(0.6); }
.aphid-sprite.squashed { pointer-events: none; opacity: 0.4; transform: scale(0.3) rotate(45deg); transition: all 0.3s; }

/* Event banners */
#event-banner {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  padding: 12px 30px; border-radius: 16px; font-size: 22px; font-weight: bold;
  color: #fff; z-index: 60; pointer-events: none; display: none;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.7); animation: bannerPop 0.4s ease-out;
  white-space: nowrap;
}
@keyframes bannerPop { 0% { transform: translateX(-50%) scale(0.5); opacity: 0; } 100% { transform: translateX(-50%) scale(1); opacity: 1; } }

/* Screen effects */
#screen-border-effect {
  position: fixed; inset: 0; z-index: 45; pointer-events: none; display: none;
}
#rainbow-overlay {
  position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 45; pointer-events: none; display: none;
  background: linear-gradient(180deg, rgba(255,0,0,0.15), rgba(255,165,0,0.12), rgba(255,255,0,0.1), rgba(0,128,0,0.1), rgba(0,0,255,0.1), rgba(75,0,130,0.08), transparent);
}
#sparkle-container { position: fixed; inset: 0; z-index: 45; pointer-events: none; display: none; }
.sparkle {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  background: radial-gradient(circle, #FFD700, transparent);
  animation: sparkleAnim 1s ease-out infinite;
}
@keyframes sparkleAnim { 0% { transform: scale(0); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.8; } 100% { transform: scale(0); opacity: 0; } }

/* Sound unmute button (prominent) */
#unmute-btn {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  z-index: 15; padding: 10px 24px; border-radius: 25px;
  border: 2px solid rgba(255,255,255,0.4); background: rgba(76,175,80,0.7);
  color: #fff; font-size: 16px; font-weight: bold; cursor: pointer;
  backdrop-filter: blur(10px); animation: pulse 2s infinite; display: none;
}

#sound-toggle {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(80px);
  z-index: 10; width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3); background: rgba(100,100,100,0.5);
  color: #fff; font-size: 18px; cursor: pointer; backdrop-filter: blur(10px);
}

#start-screen {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
}
#start-screen h1 { font-size: 52px; color: #4CAF50; margin-bottom: 10px; text-shadow: 0 0 30px rgba(76,175,80,0.5); }
#start-screen p { color: rgba(255,255,255,0.6); font-size: 16px; margin-bottom: 30px; }
#start-btn {
  padding: 15px 50px; border-radius: 30px; border: 2px solid #4CAF50;
  background: rgba(76,175,80,0.3); color: #fff; font-size: 20px; cursor: pointer;
  transition: all 0.3s; animation: pulse 2s infinite;
}
#start-btn:hover { background: rgba(76,175,80,0.6); }
</style>
</head>
<body>

<div id="start-screen">
  <h1>🍃 Leaf Life</h1>
  <p>Survive the seasons. Grow. Photosynthesize.</p>
  <button id="start-btn" onclick="startGame()">🌱 Begin</button>
</div>

<div id="hud">
  <div id="sugar-display"><span class="icon">🍬</span> <span id="sugar-count">0</span><span id="sugar-per-sec"></span></div>
</div>

<div id="sky-arc">
  <div id="sky-arc-icon">☀️</div>
</div>
<div id="quota-display">Quota: 0 / 0</div>

<div id="status-bar">
  <div class="status-pill" id="season-pill">🌸 Spring</div>
  <div class="status-pill" id="weather-pill">☀️ Sunny</div>
  <div class="status-pill" id="event-pill">🐛 Event</div>
  <div class="status-pill" id="cycle-pill">Cycle 1</div>
</div>

<button id="photo-btn" onclick="doPhotosynthesis(event)">☀️<br>Click!</button>

<div id="aphid-overlay"></div>
<div id="aphid-timer"></div>
<div id="aphid-count"></div>
<div id="aphid-result"></div>
<div id="event-banner"></div>
<div id="screen-border-effect"></div>
<div id="rainbow-overlay"></div>
<div id="sparkle-container"></div>
<button id="unmute-btn" onclick="enableSound()">🔊 Tap to Enable Sound</button>
<button id="shop-btn" onclick="toggleShop()">🛒 Shop</button>
<button id="skill-btn" onclick="toggleSkills()">🌳 Skills</button>

<div id="shop-backdrop" class="panel-backdrop" onclick="closeShop()" style="display:none;"></div>
<div id="shop-panel">
  <button class="panel-close" onclick="closeShop()">✕</button>

</div>

  <button class="panel-close" onclick="closeSkills()">✕</button>

</div>

<div id="game-over">
  <h1>🍂 Leaf Fallen</h1>
  <div class="stats" id="go-cycles"></div>
  <div class="stats" id="go-sugar"></div>
  <div class="stats" id="go-season"></div>
  <div class="quote" id="go-quote"></div>
  <button id="retry-btn" onclick="restartGame()">🌱 Try Again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============ ORBIT CONTROLS (inline mini-implementation) ============
class SimpleOrbitControls {
  constructor(camera, domElement) {
    this.camera = camera;
    this.domElement = domElement;
    this.target = new THREE.Vector3(0, 3, 0);
    this.spherical = new THREE.Spherical();
    this.sphericalDelta = new THREE.Spherical();
    this.rotateSpeed = 0.005;
    this.isDragging = false;
    this.lastMouse = { x: 0, y: 0 };
    this.minPolar = 0.2;
    this.maxPolar = Math.PI / 2 - 0.05;
    this.minDist = 8;
    this.maxDist = 40;

    // Init spherical from camera position
    const offset = new THREE.Vector3().subVectors(camera.position, this.target);
    this.spherical.setFromVector3(offset);

    domElement.addEventListener('pointerdown', e => {
      if (e.button === 0) { this.isDragging = true; this.lastMouse = { x: e.clientX, y: e.clientY }; }
    });
    domElement.addEventListener('pointermove', e => {
      if (!this.isDragging) return;
      const dx = e.clientX - this.lastMouse.x;
      const dy = e.clientY - this.lastMouse.y;
      this.spherical.theta -= dx * this.rotateSpeed;
      this.spherical.phi = Math.max(this.minPolar, Math.min(this.maxPolar, this.spherical.phi + dy * this.rotateSpeed));
      this.lastMouse = { x: e.clientX, y: e.clientY };
    });
    domElement.addEventListener('pointerup', () => { this.isDragging = false; });
    domElement.addEventListener('wheel', e => {
      this.spherical.radius = Math.max(this.minDist, Math.min(this.maxDist, this.spherical.radius + e.deltaY * 0.02));
      e.preventDefault();
    }, { passive: false });
  }
  update() {
    const offset = new THREE.Vector3().setFromSpherical(this.spherical);
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);
  }
}

// ============ GAME STATE ============
const G = {
  sugar: 0, totalSugar: 0, sugarThisCycle: 0,
  cycle: 1, timer: 60, quota: 10,
  season: 'spring', seasonTimer: 0, seasonIndex: 0,
  weather: 'sunny', weatherTimer: 0, weatherDuration: 0,
  event: null, eventTimer: 0, eventDuration: 0, nextEventIn: 0,
  clickPower: 1, passiveGen: 0, weatherResist: 0,
  alive: true, started: false, gameOver: false,
  leafHealth: 1, leafScale: 1,
  aphidDamageCycles: 0, aphidProductionMult: 1,
  upgrades: {
    cuticle: { level: 0, max: 5, baseCost: 15, costMult: 2.5, desc: '+1 sugar/click', icon: '🛡️' },
    chloro: { level: 0, max: 5, baseCost: 30, costMult: 2.5, desc: '+1 passive sugar/sec', icon: '🧬' },
    weatherRes: { level: 0, max: 3, baseCost: 50, costMult: 2.5, desc: '-25% weather penalty', icon: '🌂' },
  },
  skills: {},
  deathQuotes: [
    "Every leaf must fall... but not every leaf is forgotten.",
    "You photosynthesized with honor.",
    "The tree remembers your contribution.",
    "In the cycle of life, you played your part beautifully.",
    "A brave leaf in a harsh world.",
    "The wind takes us all eventually.",
    "You were the greenest of them all.",
    "Nature is beautiful and cruel in equal measure.",
  ],
};

const SEASONS = [
  { name: 'spring', label: '🌸 Spring', mult: 1.0, ground: 0x4a8c3f, leafColors: [0x55cc55, 0x66dd44, 0x77ee55] },
  { name: 'summer', label: '☀️ Summer', mult: 1.25, ground: 0x3d7a30, leafColors: [0x228822, 0x2d6b2d, 0x1a661a] },
  { name: 'fall', label: '🍂 Fall', mult: 0.75, ground: 0x8c6c3f, leafColors: [0xdd6622, 0xcc4411, 0xddaa22, 0xbb3300] },
  { name: 'winter', label: '❄️ Winter', mult: 0.5, ground: 0xaabbcc, leafColors: [0x887744, 0x665533] },
];

const WEATHERS = [
  { name: 'sunny', label: '☀️ Sunny', mult: 1.0 },
  { name: 'rain', label: '🌧️ Rain', mult: 1.5 },
  { name: 'cold', label: '🥶 Cold', mult: 0.5 },
  { name: 'heat', label: '🔥 Heat', mult: 0.5 },
];

const EVENTS = [
  { name: 'aphid', label: '🐛 Aphid Attack!', mult: 1.0, duration: 12, minigame: true },
  { name: 'pollinator', label: '🐝 Pollinator Visit!', mult: 1.5, duration: 10 },
  { name: 'wind', label: '💨 Strong Wind!', mult: 0.8, duration: 12 },
  { name: 'rainbow', label: '🌈 Rainbow!', mult: 1.75, duration: 10, rare: true },
];

const SKILL_TREE = [
  { branch: 'photo', label: 'Photosynthesis', color: '#FFD700', nodes: [
    { id: 'clickI', name: 'Click+I', cost: 50, effect: () => { G.clickPower += 1; }, desc: '+1 click power' },
    { id: 'clickII', name: 'Click+II', cost: 150, effect: () => { G.clickPower += 2; }, desc: '+2 click power' },
    { id: 'clickIII', name: 'Click+III', cost: 400, effect: () => { G.clickPower += 3; }, desc: '+3 click power' },
    { id: 'overdrive', name: 'Overdrive', cost: 1000, effect: () => { G.passiveGen += 3; }, desc: '+3 passive/s' },
  ]},
  { branch: 'resilience', label: 'Resilience', color: '#2196F3', nodes: [
    { id: 'coldI', name: 'Cold Res I', cost: 75, effect: () => { G.weatherResist += 0.15; }, desc: '+15% resist' },
    { id: 'coldII', name: 'Cold Res II', cost: 200, effect: () => { G.weatherResist += 0.15; }, desc: '+15% resist' },
    { id: 'coldIII', name: 'Cold Res III', cost: 500, effect: () => { G.weatherResist += 0.2; }, desc: '+20% resist' },
    { id: 'evergreen', name: 'Evergreen', cost: 1200, effect: () => { G.skills.evergreen = true; }, desc: 'Immune to winter' },
  ]},
  { branch: 'growth', label: 'Growth', color: '#4CAF50', nodes: [
    { id: 'thickI', name: 'Cuticle I', cost: 60, effect: () => { G.leafHealth += 0.2; }, desc: '+20% health' },
    { id: 'thickII', name: 'Cuticle II', cost: 175, effect: () => { G.leafHealth += 0.2; }, desc: '+20% health' },
    { id: 'bark', name: 'Bark Armor', cost: 450, effect: () => { G.leafHealth += 0.3; }, desc: '+30% health' },
    { id: 'oak', name: 'Ancient Oak', cost: 1100, effect: () => { G.leafHealth += 0.5; G.leafScale += 0.3; }, desc: 'Massive health' },
  ]},
  { branch: 'cosmetic', label: 'Cosmetic', color: '#E040FB', nodes: [
    { id: 'colorShift', name: 'Color Shift', cost: 100, effect: () => { G.skills.colorShift = true; }, desc: 'Leaf color changes' },
    { id: 'species', name: 'Species', cost: 300, effect: () => { G.skills.species = true; }, desc: 'New leaf shape' },
    { id: 'legendary', name: 'Legendary', cost: 800, effect: () => { G.skills.legendary = true; }, desc: 'Glowing leaf!' },
  ]},
];

// ============ THREE.JS SETUP ============
let scene, camera, renderer, controls;
let dirLight, ambientLight, sunMesh, moonMesh, groundMesh;
let leafGroup, leafMesh, leafGlow;
let fallingLeaves = [], particles = [];
let rainDrops = [], snowFlakes = [];
let stars = [];
let dyingLeaf = null;
let forestTrees = [];

function initScene() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x88aacc, 0.012);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 6, 18);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0;
  document.body.prepend(renderer.domElement);

  controls = new SimpleOrbitControls(camera, renderer.domElement);
  controls.target.set(0, 3, 0);

  // Lights
  ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
  dirLight.position.set(20, 30, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.left = -30;
  dirLight.shadow.camera.right = 30;
  dirLight.shadow.camera.top = 30;
  dirLight.shadow.camera.bottom = -10;
  scene.add(dirLight);

  // Sun sphere
  const sunGeo = new THREE.SphereGeometry(2, 16, 16);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffee88 });
  sunMesh = new THREE.Mesh(sunGeo, sunMat);
  scene.add(sunMesh);

  // Moon sphere
  const moonGeo = new THREE.SphereGeometry(1.2, 16, 16);
  const moonMat = new THREE.MeshBasicMaterial({ color: 0xddeeff });
  moonMesh = new THREE.Mesh(moonGeo, moonMat);
  scene.add(moonMesh);

  // Stars
  const starGeo = new THREE.BufferGeometry();
  const starPositions = [];
  for (let i = 0; i < 600; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI * 0.45;
    const r = 150 + Math.random() * 50;
    starPositions.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.cos(phi) + 20,
      r * Math.sin(phi) * Math.sin(theta)
    );
  }
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0 });
  const starField = new THREE.Points(starGeo, starMat);
  scene.add(starField);
  stars = [starField];

  // Ground
  const groundGeo = new THREE.PlaneGeometry(200, 200);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a8c3f });
  groundMesh = new THREE.Mesh(groundGeo, groundMat);
  groundMesh.rotation.x = -Math.PI / 2;
  groundMesh.receiveShadow = true;
  scene.add(groundMesh);

  // Build forest
  buildForest();

  // Player leaf — floating in front center
  leafGroup = new THREE.Group();
  leafGroup.position.set(0, 4.5, 5);
  scene.add(leafGroup);
  createLeaf();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

// ============ FOREST GENERATION ============
function buildForest() {
  // Remove old trees
  forestTrees.forEach(t => scene.remove(t));
  forestTrees = [];

  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5d3c1a });
  const darkTrunkMat = new THREE.MeshLambertMaterial({ color: 0x4a2e15 });

  // Tree positions — spread around, clear center for player leaf
  const treePositions = [];
  for (let i = 0; i < 35; i++) {
    let x, z;
    do {
      x = (Math.random() - 0.5) * 80;
      z = (Math.random() - 0.5) * 80;
    } while (Math.abs(x) < 4 && z > 0 && z < 10); // keep center clear
    const scale = 0.6 + Math.random() * 0.8;
    treePositions.push({ x, z, scale });
  }

  treePositions.forEach(tp => {
    const group = new THREE.Group();
    group.position.set(tp.x, 0, tp.z);

    // Trunk
    const height = 4 + tp.scale * 4;
    const trunkGeo = new THREE.CylinderGeometry(0.2 * tp.scale, 0.4 * tp.scale, height, 6);
    const trunk = new THREE.Mesh(trunkGeo, Math.random() > 0.5 ? trunkMat : darkTrunkMat);
    trunk.position.y = height / 2;
    trunk.castShadow = true;
    group.add(trunk);

    // Branches
    const branchCount = 3 + Math.floor(Math.random() * 3);
    for (let b = 0; b < branchCount; b++) {
      const bLen = 1 + Math.random() * 1.5 * tp.scale;
      const bGeo = new THREE.CylinderGeometry(0.04 * tp.scale, 0.1 * tp.scale, bLen, 5);
      const branch = new THREE.Mesh(bGeo, trunkMat);
      const angle = (b / branchCount) * Math.PI * 2 + Math.random();
      const bh = height * 0.5 + Math.random() * height * 0.4;
      branch.position.set(Math.cos(angle) * 0.5 * tp.scale, bh, Math.sin(angle) * 0.5 * tp.scale);
      branch.rotation.z = Math.cos(angle) * 0.7;
      branch.rotation.x = Math.sin(angle) * 0.4;
      branch.castShadow = true;
      group.add(branch);
    }

    // Crown foliage — multiple overlapping spheres
    const crownColor = new THREE.Color(0x2d7a2d);
    const crownCount = 2 + Math.floor(Math.random() * 3);
    for (let c = 0; c < crownCount; c++) {
      const s = (1.2 + Math.random() * 1.0) * tp.scale;
      const crownMat = new THREE.MeshLambertMaterial({ color: crownColor.clone() });
      const crown = new THREE.Mesh(new THREE.SphereGeometry(s, 6, 5), crownMat);
      crown.position.set(
        (Math.random() - 0.5) * 1.2 * tp.scale,
        height * 0.85 + Math.random() * 1.5 * tp.scale,
        (Math.random() - 0.5) * 1.2 * tp.scale
      );
      crown.castShadow = true;
      crown.receiveShadow = true;
      crown.userData.isCrown = true;
      group.add(crown);
    }

    scene.add(group);
    forestTrees.push(group);
  });
}

function updateForestColors() {
  const season = SEASONS[G.seasonIndex];
  const seasonColors = {
    spring: 0x44aa44,
    summer: 0x2d7a2d,
    fall: 0xbb6622,
    winter: 0x667766,
  };
  const targetColor = new THREE.Color(seasonColors[season.name]);

  forestTrees.forEach(group => {
    group.traverse(child => {
      if (child.isMesh && child.userData.isCrown) {
        child.material.color.lerp(targetColor, 0.02);
      }
    });
  });

  if (groundMesh) {
    groundMesh.material.color.lerp(new THREE.Color(season.ground), 0.02);
  }
}

// ============ PLAYER LEAF ============
function createLeaf() {
  while (leafGroup.children.length) leafGroup.remove(leafGroup.children[0]);

  // Proper leaf shape — pointed tip, wider middle, tapered base with slight asymmetry
  const leafShape = new THREE.Shape();
  // Start at stem base
  leafShape.moveTo(0, -1.2);
  // Right side — curves out then to pointed tip
  leafShape.bezierCurveTo(0.15, -1.0, 0.5, -0.7, 0.85, -0.2);
  leafShape.bezierCurveTo(1.0, 0.1, 0.9, 0.5, 0.7, 0.8);
  leafShape.bezierCurveTo(0.45, 1.15, 0.15, 1.4, 0, 1.55); // pointed tip
  // Left side — mirror back down
  leafShape.bezierCurveTo(-0.15, 1.4, -0.45, 1.15, -0.7, 0.8);
  leafShape.bezierCurveTo(-0.9, 0.5, -1.0, 0.1, -0.85, -0.2);
  leafShape.bezierCurveTo(-0.5, -0.7, -0.15, -1.0, 0, -1.2);

  const extrudeSettings = { depth: 0.04, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 2 };
  const leafGeo = new THREE.ExtrudeGeometry(leafShape, extrudeSettings);
  const leafMat = new THREE.MeshPhongMaterial({
    color: 0x33aa33,
    emissive: 0x0a220a,
    emissiveIntensity: 0.3,
    side: THREE.DoubleSide,
    shininess: 50,
  });
  leafMesh = new THREE.Mesh(leafGeo, leafMat);
  leafMesh.castShadow = true;
  leafMesh.userData.baseEmissive = 0x0a220a;
  leafMesh.userData.baseEmissiveIntensity = 0.3;
  leafGroup.add(leafMesh);

  // Vein lines — central midrib + side veins
  const veinMat = new THREE.MeshBasicMaterial({ color: 0x226622, transparent: true, opacity: 0.7, side: THREE.DoubleSide });

  // Central midrib (stem to tip)
  const midribShape = new THREE.Shape();
  midribShape.moveTo(-0.02, -1.2);
  midribShape.lineTo(0.02, -1.2);
  midribShape.lineTo(0.015, 1.5);
  midribShape.lineTo(-0.015, 1.5);
  midribShape.lineTo(-0.02, -1.2);
  const midribGeo = new THREE.ShapeGeometry(midribShape);
  const midrib = new THREE.Mesh(midribGeo, veinMat);
  midrib.position.z = 0.06;
  leafGroup.add(midrib);

  // Side veins
  const sideVeinPositions = [
    { y: -0.5, len: 0.6, angle: 0.5 },
    { y: -0.1, len: 0.75, angle: 0.45 },
    { y: 0.3, len: 0.7, angle: 0.4 },
    { y: 0.65, len: 0.55, angle: 0.35 },
    { y: 0.95, len: 0.35, angle: 0.3 },
  ];
  sideVeinPositions.forEach(v => {
    for (let side = -1; side <= 1; side += 2) {
      const veinShape = new THREE.Shape();
      veinShape.moveTo(0, 0);
      veinShape.lineTo(side * v.len * Math.cos(v.angle), v.len * Math.sin(v.angle));
      veinShape.lineTo(side * v.len * Math.cos(v.angle) - 0.01, v.len * Math.sin(v.angle) + 0.015);
      veinShape.lineTo(0, 0.015);
      const vGeo = new THREE.ShapeGeometry(veinShape);
      const vMesh = new THREE.Mesh(vGeo, veinMat);
      vMesh.position.set(0, v.y, 0.06);
      leafGroup.add(vMesh);
    }
  });

  // Glow ring
  const glowGeo = new THREE.RingGeometry(1.3, 1.7, 32);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0x66ff66, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
  leafGlow = new THREE.Mesh(glowGeo, glowMat);
  leafGlow.position.z = -0.1;
  leafGroup.add(leafGlow);

  // Stem — thicker, longer
  const stemGeo = new THREE.CylinderGeometry(0.04, 0.06, 0.8, 5);
  const stemMat = new THREE.MeshLambertMaterial({ color: 0x5d3c1a });
  const stem = new THREE.Mesh(stemGeo, stemMat);
  stem.position.y = -1.6;
  leafGroup.add(stem);

  // Always-visible point light on the leaf so it glows at night
  const leafLight = new THREE.PointLight(0x66ff66, 1.5, 8);
  leafLight.position.set(0, 0, 0.5);
  leafGroup.add(leafLight);
  leafGroup.userData.leafLight = leafLight;
}

// ============ DAY/NIGHT CYCLE ============
function getDayPhase() {
  // timer goes 60 → 0, so elapsed = 60 - timer
  const elapsed = 60 - G.timer;
  // 0=sunrise, 15=noon, 30=sunset, 45=midnight, 60=sunrise
  return elapsed / 60; // 0..1
}

function updateDayNightCycle() {
  const phase = getDayPhase(); // 0..1 through the day
  // Map to angle: 0=sunrise(east), 0.25=noon(top), 0.5=sunset(west), 0.75=midnight(below)
  const angle = phase * Math.PI * 2 - Math.PI / 2; // start at east

  const sunRadius = 60;
  const sunX = Math.cos(angle) * sunRadius;
  const sunY = Math.sin(angle) * sunRadius;
  sunMesh.position.set(sunX, sunY, -20);

  // Moon is opposite
  moonMesh.position.set(-sunX, -sunY, -20);

  // Sun visibility
  const sunAbove = sunY > -5;
  sunMesh.visible = sunAbove;
  moonMesh.visible = !sunAbove;

  // Sky color based on sun height
  const sunHeight = Math.sin(angle); // -1 to 1
  let skyTop, skyBottom, fogColor;
  let dirColor, dirIntensity, ambColor, ambIntensity;

  if (sunHeight > 0.3) {
    // Daytime — bright
    const t = Math.min(1, (sunHeight - 0.3) / 0.5);
    skyTop = lerpColor(0xf0a050, 0x4488dd, t);
    skyBottom = lerpColor(0xffd0a0, 0xaaccff, t);
    fogColor = lerpColor(0xddb878, 0x88aacc, t);
    dirColor = lerpColor(0xffcc88, 0xffffff, t);
    dirIntensity = 0.8 + t * 0.4;
    ambColor = lerpColor(0xffe0b0, 0xccddff, t);
    ambIntensity = 0.4 + t * 0.2;
  } else if (sunHeight > -0.1) {
    // Sunrise/sunset transition
    const t = (sunHeight + 0.1) / 0.4; // 0 at -0.1, 1 at 0.3
    skyTop = lerpColor(0x1a1a40, 0xf0a050, t);
    skyBottom = lerpColor(0x2a2040, 0xffd0a0, t);
    fogColor = lerpColor(0x333355, 0xddb878, t);
    dirColor = lerpColor(0x4466aa, 0xffcc88, t);
    dirIntensity = 0.1 + t * 0.7;
    ambColor = lerpColor(0x223355, 0xffe0b0, t);
    ambIntensity = 0.15 + t * 0.25;
  } else {
    // Night
    const t = Math.min(1, (-0.1 - sunHeight) / 0.6);
    skyTop = lerpColor(0x1a1a40, 0x0a0a20, t);
    skyBottom = lerpColor(0x2a2040, 0x151530, t);
    fogColor = lerpColor(0x333355, 0x111122, t);
    dirColor = 0x4466aa;
    dirIntensity = 0.1 - t * 0.05;
    ambColor = lerpColor(0x223355, 0x111133, t);
    ambIntensity = 0.15 - t * 0.05;
  }

  // Apply sky
  updateSkyGradient(skyTop, skyBottom);
  scene.fog.color.set(fogColor);

  // Apply lighting
  dirLight.color.set(dirColor);
  dirLight.intensity = Math.max(0.05, dirIntensity);
  dirLight.position.set(sunX * 0.5, Math.max(5, sunY), -10);

  ambientLight.color.set(ambColor);
  ambientLight.intensity = Math.max(0.1, ambIntensity);

  // Stars opacity
  const starOpacity = sunHeight < -0.05 ? Math.min(1, (-0.05 - sunHeight) / 0.3) : 0;
  if (stars[0]) stars[0].material.opacity = starOpacity * 0.8;

  // Tone mapping exposure
  renderer.toneMappingExposure = sunHeight > 0 ? 1.0 + sunHeight * 0.3 : Math.max(0.3, 1.0 + sunHeight * 0.7);

  // Boost leaf glow at night so it's always visible
  if (leafMesh && leafGroup.userData.leafLight) {
    const nightFactor = Math.max(0, -sunHeight); // 0 during day, up to 1 at night
    leafMesh.material.emissiveIntensity = 0.3 + nightFactor * 0.7;
    leafGroup.userData.leafLight.intensity = 0.5 + nightFactor * 2.5;
  }

  // Update HUD sun/moon arc
  updateSkyArcHUD(phase);
}

function lerpColor(c1, c2, t) {
  const color = new THREE.Color(c1);
  color.lerp(new THREE.Color(c2), Math.max(0, Math.min(1, t)));
  return color;
}

let skyCanvas, skyCtx, skyTexture;
function updateSkyGradient(topColor, bottomColor) {
  if (!skyCanvas) {
    skyCanvas = document.createElement('canvas');
    skyCanvas.width = 2;
    skyCanvas.height = 256;
    skyCtx = skyCanvas.getContext('2d');
    skyTexture = new THREE.CanvasTexture(skyCanvas);
  }
  const top = topColor instanceof THREE.Color ? topColor : new THREE.Color(topColor);
  const bot = bottomColor instanceof THREE.Color ? bottomColor : new THREE.Color(bottomColor);
  const grad = skyCtx.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, `rgb(${top.r*255|0},${top.g*255|0},${top.b*255|0})`);
  grad.addColorStop(1, `rgb(${bot.r*255|0},${bot.g*255|0},${bot.b*255|0})`);
  skyCtx.fillStyle = grad;
  skyCtx.fillRect(0, 0, 2, 256);
  skyTexture.needsUpdate = true;
  scene.background = skyTexture;
}

function updateSkyArcHUD(phase) {
  const icon = document.getElementById('sky-arc-icon');
  const arcW = 380;
  // Arc path: x goes 0→arcW, y is an inverted arc
  const x = phase * arcW + 10;
  const y = 50 - Math.sin(phase * Math.PI) * 45;
  const isDay = phase < 0.5;
  icon.textContent = isDay ? '☀️' : '🌙';
  icon.style.left = x + 'px';
  icon.style.top = y + 'px';
  icon.style.filter = isDay ?
    'drop-shadow(0 0 8px rgba(255,200,0,0.8))' :
    'drop-shadow(0 0 8px rgba(150,180,255,0.8))';
}

// ============ FALLING LEAVES ============
const leafGeoTemplate = (() => {
  const s = new THREE.Shape();
  s.moveTo(0, -0.3);
  s.bezierCurveTo(0.2, -0.1, 0.25, 0.1, 0.12, 0.3);
  s.bezierCurveTo(0.05, 0.38, -0.05, 0.38, -0.12, 0.3);
  s.bezierCurveTo(-0.25, 0.1, -0.2, -0.1, 0, -0.3);
  return new THREE.ExtrudeGeometry(s, { depth: 0.01, bevelEnabled: false });
})();

function spawnFallingLeaf() {
  const season = SEASONS[G.seasonIndex];
  const colors = season.leafColors;
  const color = colors[Math.floor(Math.random() * colors.length)];
  const mat = new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
  const leaf = new THREE.Mesh(leafGeoTemplate, mat);
  const scale = 0.5 + Math.random() * 0.8;
  leaf.scale.setScalar(scale);
  leaf.position.set(
    (Math.random() - 0.5) * 60,
    10 + Math.random() * 8,
    (Math.random() - 0.5) * 60
  );
  leaf.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  leaf.userData = {
    windX: (Math.random() - 0.5) * 2,
    windZ: (Math.random() - 0.5) * 1,
    rotSpeed: (Math.random() - 0.5) * 3,
    swayPhase: Math.random() * Math.PI * 2,
    fallSpeed: 1 + Math.random() * 1.5,
  };
  scene.add(leaf);
  fallingLeaves.push(leaf);
}

function updateFallingLeaves(dt) {
  const season = SEASONS[G.seasonIndex];
  const isWinter = season.name === 'winter';
  const maxLeaves = isWinter ? 15 : 60;
  const spawnRate = isWinter ? 0.3 : 1.5;

  // Spawn
  if (fallingLeaves.length < maxLeaves && Math.random() < spawnRate * dt * 10) {
    spawnFallingLeaf();
  }

  const windEvent = G.event && G.event.name === 'wind';
  const windBoost = windEvent ? 4 : 1;

  for (let i = fallingLeaves.length - 1; i >= 0; i--) {
    const leaf = fallingLeaves[i];
    const ud = leaf.userData;
    ud.swayPhase += dt * 2;

    leaf.position.y -= ud.fallSpeed * dt;
    leaf.position.x += (ud.windX + Math.sin(ud.swayPhase) * 0.5) * dt * windBoost;
    leaf.position.z += (ud.windZ + Math.cos(ud.swayPhase * 0.7) * 0.3) * dt * windBoost;
    leaf.rotation.x += ud.rotSpeed * dt;
    leaf.rotation.z += ud.rotSpeed * 0.5 * dt;

    if (leaf.position.y < -1 || Math.abs(leaf.position.x) > 50 || Math.abs(leaf.position.z) > 50) {
      scene.remove(leaf);
      fallingLeaves.splice(i, 1);
    }
  }
}

// ============ GAME LOGIC ============
let lastTime = 0;
let nextWeatherIn = 15;

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  G.started = true;
  G.alive = true;
  G.nextEventIn = 30 + Math.random() * 30;
  nextWeatherIn = 15 + Math.random() * 15;
  // Show unmute prompt if sound not yet enabled
  if (!soundEnabled) {
    document.getElementById('unmute-btn').style.display = 'block';
  }
  // Try to init audio on this user gesture
  initAudio();
  gameLoop(performance.now());
}

function restartGame() {
  Object.assign(G, {
    sugar: 0, totalSugar: 0, sugarThisCycle: 0,
    cycle: 1, timer: 60, quota: 10,
    season: 'spring', seasonTimer: 0, seasonIndex: 0,
    weather: 'sunny', weatherTimer: 0, weatherDuration: 0,
    event: null, eventTimer: 0, eventDuration: 0, nextEventIn: 30 + Math.random() * 30,
    clickPower: 1, passiveGen: 0, weatherResist: 0,
    alive: true, gameOver: false, leafHealth: 1, leafScale: 1,
    skills: {},
    upgrades: {
      cuticle: { level: 0, max: 5, baseCost: 15, costMult: 2.5, desc: '+1 sugar/click', icon: '🛡️' },
      chloro: { level: 0, max: 5, baseCost: 30, costMult: 2.5, desc: '+1 passive sugar/sec', icon: '🧬' },
      weatherRes: { level: 0, max: 3, baseCost: 50, costMult: 2.5, desc: '-25% weather penalty', icon: '🌂' },
    },
    aphidDamageCycles: 0, aphidProductionMult: 1,
  });
  SKILL_TREE.forEach(b => b.nodes.forEach(n => n.unlocked = false));
  nextWeatherIn = 15 + Math.random() * 15;
  document.getElementById('game-over').style.display = 'none';

  leafGroup.position.set(0, 4.5, 5);
  leafGroup.rotation.set(0, 0, 0);
  leafGroup.visible = true;
  createLeaf();
  if (dyingLeaf) { scene.remove(dyingLeaf); dyingLeaf = null; }

  // Clear falling leaves & cosmetics
  fallingLeaves.forEach(l => scene.remove(l));
  fallingLeaves = [];
  clearSeasonalCosmetics();
  lastSeasonForCosmetics = -1;
  if (aphidGame.active) {
    aphidGame.active = false;
    aphidGame.aphids = [];
    aphidGame.remaining = 0;
    const overlay = document.getElementById('aphid-overlay');
    overlay.classList.remove('active');
    overlay.innerHTML = '';
  }
  hideEventEffects();

  updateHUD();
  gameLoop(performance.now());
}

function gameLoop(now) {
  if (!G.alive && !G.gameOver) return;
  if (G.gameOver) return;

  const dt = Math.min((now - (lastTime || now)) / 1000, 0.1);
  lastTime = now;

  if (G.alive) {
    // Timer
    G.timer -= dt;
    if (G.timer <= 0) {
      if (G.sugarThisCycle >= G.quota) {
        G.cycle++;
        G.timer = 60;
        // Harder progression: steeper after cycle 10
        if (G.cycle <= 10) {
          G.quota = Math.floor(G.quota * 1.4 + 5);
        } else {
          G.quota = Math.floor(G.quota * 1.8 + 15);
        }
        G.sugarThisCycle = 0;
        G.leafScale += 0.05;
        leafGroup.scale.setScalar(G.leafScale);
        // Aphid damage recovery
        if (G.aphidDamageCycles > 0) {
          G.aphidDamageCycles--;
          if (G.aphidDamageCycles <= 0) {
            G.aphidProductionMult = 1;
            removeLeafHoles();
          }
        }
      } else {
        triggerDeath();
        requestAnimationFrame(gameLoop);
        return;
      }
    }

    // Season cycling (4 min total, 1 min each)
    G.seasonTimer += dt;
    if (G.seasonTimer >= 60) {
      G.seasonTimer = 0;
      G.seasonIndex = (G.seasonIndex + 1) % 4;
      G.season = SEASONS[G.seasonIndex].name;
    }

    // Weather
    nextWeatherIn -= dt;
    if (nextWeatherIn <= 0) {
      const w = WEATHERS[Math.floor(Math.random() * WEATHERS.length)];
      G.weather = w.name;
      G.weatherDuration = 15 + Math.random() * 15;
      G.weatherTimer = G.weatherDuration;
      nextWeatherIn = 30 + Math.random() * 30;
    }
    if (G.weatherTimer > 0) {
      G.weatherTimer -= dt;
      if (G.weatherTimer <= 0) { G.weather = 'sunny'; G.weatherTimer = 0; }
    }

    // Events
    G.nextEventIn -= dt;
    if (G.nextEventIn <= 0 && !G.event && !aphidGame.active) {
      let pool = EVENTS.filter(e => !e.rare || Math.random() < 0.3);
      const ev = pool[Math.floor(Math.random() * pool.length)];
      if (ev.minigame && ev.name === 'aphid') {
        startAphidMinigame();
        G.nextEventIn = 30 + Math.random() * 30;
      } else {
        G.event = ev;
        G.eventDuration = ev.duration;
        G.eventTimer = ev.duration;
        G.nextEventIn = 30 + Math.random() * 30;
        showEventBanner(ev.name);
      }
    }
    if (G.event) {
      G.eventTimer -= dt;
      if (G.eventTimer <= 0) { G.event = null; hideEventEffects(); }
    }

    // Aphid minigame tick
    if (aphidGame.active) updateAphidMinigame(dt);

    // Aphid damage recovery
    if (G.aphidDamageCycles > 0) {
      // tracked per cycle completion
    }

    // Passive generation
    if (G.passiveGen > 0) {
      const mult = getMultiplier();
      const passive = G.passiveGen * mult * dt;
      G.sugar += passive;
      G.totalSugar += passive;
      G.sugarThisCycle += passive;
    }
  }

  // Visuals
  updateDayNightCycle();
  updateForestColors();
  updateLeafAnimation(dt);
  updateFallingLeaves(dt);
  updateParticles(dt);
  updateRainSnow(dt);
  updateSeasonalCosmetics(dt);
  if (soundEnabled) updateAmbientSounds();
  if (dyingLeaf) updateDyingLeaf(dt);
  controls.update();
  updateHUD();
  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

function getMultiplier() {
  const season = SEASONS[G.seasonIndex];
  let seasonMult = season.mult;
  if (G.skills.evergreen && season.name === 'winter') seasonMult = 1.0;

  const weatherData = WEATHERS.find(w => w.name === G.weather);
  let weatherMult = weatherData ? weatherData.mult : 1;
  if (weatherMult < 1) {
    const penalty = 1 - weatherMult;
    weatherMult = 1 - penalty * Math.max(0, 1 - G.weatherResist);
  }

  let eventMult = G.event ? G.event.mult : 1;
  return seasonMult * weatherMult * eventMult * G.aphidProductionMult;
}

function doPhotosynthesis(e) {
  if (!G.alive || !G.started) return;
  const mult = getMultiplier();
  const amount = Math.max(1, Math.round(G.clickPower * mult));
  G.sugar += amount;
  G.totalSugar += amount;
  G.sugarThisCycle += amount;

  const ft = document.createElement('div');
  ft.className = 'float-text';
  ft.textContent = `+${amount}`;
  const bx = e.clientX || window.innerWidth / 2;
  const by = e.clientY || window.innerHeight - 150;
  ft.style.left = (bx + (Math.random() - 0.5) * 40) + 'px';
  ft.style.top = (by - 20) + 'px';
  document.body.appendChild(ft);
  setTimeout(() => ft.remove(), 1000);

  leafGroup.scale.setScalar(G.leafScale * 1.15);
  setTimeout(() => { if (G.alive) leafGroup.scale.setScalar(G.leafScale); }, 100);

  // Burst particles
  for (let i = 0; i < 3; i++) spawnParticle();
}

// ============ PARTICLES ============
function spawnParticle() {
  const geo = new THREE.SphereGeometry(0.08, 4, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true });
  const p = new THREE.Mesh(geo, mat);
  p.position.copy(leafGroup.position);
  p.velocity = new THREE.Vector3((Math.random() - 0.5) * 2, Math.random() * 3 + 1, (Math.random() - 0.5) * 2);
  p.life = 1;
  scene.add(p);
  particles.push(p);
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * 1.5;
    p.position.add(p.velocity.clone().multiplyScalar(dt));
    p.velocity.y -= dt * 3;
    p.material.opacity = Math.max(0, p.life);
    if (p.life <= 0) { scene.remove(p); particles.splice(i, 1); }
  }
}

// ============ RAIN / SNOW ============
function updateRainSnow(dt) {
  const needRain = G.weather === 'rain' && G.alive;
  const needSnow = G.season === 'winter' && G.alive;

  if (needRain && rainDrops.length < 150) {
    for (let i = 0; i < 5; i++) {
      const geo = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 3);
      const mat = new THREE.MeshBasicMaterial({ color: 0x4488cc, transparent: true, opacity: 0.5 });
      const drop = new THREE.Mesh(geo, mat);
      drop.position.set((Math.random() - 0.5) * 50, 18 + Math.random() * 5, (Math.random() - 0.5) * 50);
      scene.add(drop);
      rainDrops.push(drop);
    }
  }
  for (let i = rainDrops.length - 1; i >= 0; i--) {
    const d = rainDrops[i];
    d.position.y -= dt * 18;
    if (d.position.y < 0 || !needRain) { scene.remove(d); rainDrops.splice(i, 1); }
  }

  if (needSnow && snowFlakes.length < 80) {
    for (let i = 0; i < 2; i++) {
      const geo = new THREE.SphereGeometry(0.06, 4, 4);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
      const flake = new THREE.Mesh(geo, mat);
      flake.position.set((Math.random() - 0.5) * 50, 18, (Math.random() - 0.5) * 50);
      flake.drift = Math.random() * 2 - 1;
      scene.add(flake);
      snowFlakes.push(flake);
    }
  }
  for (let i = snowFlakes.length - 1; i >= 0; i--) {
    const f = snowFlakes[i];
    f.position.y -= dt * 1.5;
    f.position.x += Math.sin(f.position.y * 0.5 + f.drift) * dt * 0.8;
    if (f.position.y < 0 || !needSnow) { scene.remove(f); snowFlakes.splice(i, 1); }
  }
}

// ============ LEAF ANIMATION ============
let leafTime = 0;
function updateLeafAnimation(dt) {
  leafTime += dt;
  if (G.alive && leafMesh) {
    let swayAmt = 0.08;
    if (G.event && G.event.name === 'wind') swayAmt = 0.35;
    leafGroup.rotation.z = Math.sin(leafTime * 1.5) * swayAmt;
    leafGroup.rotation.x = Math.sin(leafTime * 0.8) * swayAmt * 0.5;

    // Hover bob
    leafGroup.position.y = 4.5 + Math.sin(leafTime * 1.2) * 0.15;

    // Glow pulse
    if (leafGlow) {
      leafGlow.material.opacity = 0.1 + Math.sin(leafTime * 2) * 0.08;
      leafGlow.rotation.z = leafTime * 0.2;
    }

    if (G.skills.colorShift) {
      const hue = (leafTime * 0.1) % 1;
      leafMesh.material.color.setHSL(hue, 0.7, 0.45);
    }
    if (G.skills.legendary) {
      const glow = 0.5 + Math.sin(leafTime * 3) * 0.2;
      leafMesh.material.emissive = new THREE.Color(0x44ff44);
      leafMesh.material.emissiveIntensity = glow;
    }
  }
}

// ============ DEATH ============
function triggerDeath() {
  G.alive = false;
  if (leafMesh) leafMesh.material.color.setHex(0x8B6914);

  dyingLeaf = leafGroup.clone();
  dyingLeaf.position.copy(leafGroup.position);
  scene.add(dyingLeaf);
  dyingLeaf.velocity = new THREE.Vector3((Math.random() - 0.5) * 2, 1, (Math.random() - 0.5) * 2);
  dyingLeaf.rotVel = new THREE.Vector3(Math.random() * 3, Math.random() * 5, Math.random() * 3);
  dyingLeaf.landed = false;
  leafGroup.visible = false;
}

function updateDyingLeaf(dt) {
  if (!dyingLeaf || dyingLeaf.landed) {
    if (dyingLeaf && dyingLeaf.landed && !G.gameOver) {
      G.gameOver = true;
      setTimeout(showGameOver, 500);
    }
    return;
  }
  dyingLeaf.velocity.y -= dt * 4;
  dyingLeaf.velocity.x *= (1 - dt * 0.5);
  dyingLeaf.velocity.z *= (1 - dt * 0.5);
  dyingLeaf.velocity.x += Math.sin(leafTime * 3) * dt * 2;
  dyingLeaf.position.add(dyingLeaf.velocity.clone().multiplyScalar(dt));
  dyingLeaf.rotation.x += dyingLeaf.rotVel.x * dt;
  dyingLeaf.rotation.y += dyingLeaf.rotVel.y * dt;
  dyingLeaf.rotation.z += dyingLeaf.rotVel.z * dt;
  if (dyingLeaf.position.y <= 0.1) {
    dyingLeaf.position.y = 0.1;
    dyingLeaf.landed = true;
    dyingLeaf.rotVel.set(0, 0, 0);
  }
}

function showGameOver() {
  document.getElementById('go-cycles').textContent = `Cycles Survived: ${G.cycle - 1}`;
  document.getElementById('go-sugar').textContent = `Total Sugar: ${Math.floor(G.totalSugar)}`;
  document.getElementById('go-season').textContent = `Died in: ${SEASONS[G.seasonIndex].label}`;
  document.getElementById('go-quote').textContent = G.deathQuotes[Math.floor(Math.random() * G.deathQuotes.length)];
  document.getElementById('game-over').style.display = 'flex';
}

// ============ HUD ============
function updateHUD() {
  document.getElementById('sugar-count').textContent = Math.floor(G.sugar);
  const perSec = (G.passiveGen * getMultiplier()).toFixed(1);
  document.getElementById('sugar-per-sec').textContent = G.passiveGen > 0 ? `(${perSec}/s)` : '';

  document.getElementById('quota-display').textContent = `Quota: ${Math.floor(G.sugarThisCycle)} / ${G.quota}  •  ${Math.ceil(G.timer)}s`;

  const wData = WEATHERS.find(w => w.name === G.weather);
  document.getElementById('weather-pill').textContent = wData ? wData.label : '☀️ Sunny';
  document.getElementById('cycle-pill').textContent = `Cycle ${G.cycle}`;

  const eventPill = document.getElementById('event-pill');
  if (G.event) {
    eventPill.style.display = 'block';

  }

// ============ SHOP ============
function closeShop() {
  document.getElementById('shop-panel').style.display = 'none';
  document.getElementById('shop-backdrop').style.display = 'none';
}
function closeSkills() {
  document.getElementById('skill-panel').style.display = 'none';
  document.getElementById('skill-backdrop').style.display = 'none';
}
function toggleShop() {
  const panel = document.getElementById('shop-panel');
  closeSkills();
  const showing = panel.style.display === 'block';
  panel.style.display = showing ? 'none' : 'block';
  document.getElementById('shop-backdrop').style.display = showing ? 'none' : 'block';
  if (!showing) renderShop();
}

function renderShop() {
  const container = document.getElementById('shop-items');
  container.innerHTML = '';
  for (const [key, u] of Object.entries(G.upgrades)) {
    const cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.level));
    const maxed = u.level >= u.max;
    const div = document.createElement('div');
    div.className = 'upgrade-item';
    div.innerHTML = `
      <div>
        <div class="upgrade-name">${u.icon} ${key.charAt(0).toUpperCase() + key.slice(1)} (${u.level}/${u.max})</div>
        <div class="upgrade-desc">${u.desc}</div>
      </div>
      ${maxed ? '<span class="upgrade-maxed">MAXED</span>' :
        `<button class="upgrade-cost" onclick="buyUpgrade('${key}')" ${G.sugar < cost ? 'disabled' : ''}>🍬 ${cost}</button>`}
    `;
    container.appendChild(div);
  }
}

function buyUpgrade(key) {
  const u = G.upgrades[key];
  if (u.level >= u.max) return;
  const cost = Math.floor(u.baseCost * Math.pow(u.costMult, u.level));
  if (G.sugar < cost) return;
  G.sugar -= cost;
  u.level++;
  if (key === 'cuticle') G.clickPower++;
  if (key === 'chloro') G.passiveGen++;
  if (key === 'weatherRes') G.weatherResist += 0.25;
  renderShop();
}

// ============ SKILL TREE ============
function toggleSkills() {
  const panel = document.getElementById('skill-panel');
  closeShop();
  const showing = panel.style.display === 'block';
  panel.style.display = showing ? 'none' : 'block';
  document.getElementById('skill-backdrop').style.display = showing ? 'none' : 'block';
  if (!showing) renderSkillTree();
}

function renderSkillTree() {
  const container = document.getElementById('skill-tree');
  container.innerHTML = '';
  const cx = 270, trunkBottom = 450, trunkTop = 380;

  const trunk = document.createElement('div');
  trunk.className = 'skill-branch-line';
  trunk.style.cssText = `left:${cx - 4}px; top:${trunkTop}px; width:8px; height:${trunkBottom - trunkTop}px; border-radius:4px; background:#6d4c2a;`;
  container.appendChild(trunk);

  const branchConfigs = [
    { dx: -180, label: 'Photo', startY: 350 },
    { dx: -60, label: 'Resilience', startY: 330 },
    { dx: 60, label: 'Growth', startY: 330 },
    { dx: 180, label: 'Cosmetic', startY: 350 },
  ];

  SKILL_TREE.forEach((branch, bi) => {
    const cfg = branchConfigs[bi];
    const nodes = branch.nodes;

    const lbl = document.createElement('div');
    lbl.className = 'branch-label';
    lbl.textContent = branch.label;
    lbl.style.cssText = `left:${cx + cfg.dx - 30}px; top:${cfg.startY - 25}px; color:${branch.color}; width:80px; text-align:center;`;
    container.appendChild(lbl);

    nodes.forEach((node, ni) => {
      const x = cx + cfg.dx;
      const y = cfg.startY - ni * 80 - 30;

      if (ni === 0) {
        drawLine(container, cx, trunkTop, x, y + 28, branch.color, node.unlocked);
      } else {
        const py = cfg.startY - (ni - 1) * 80 - 30;
        drawLine(container, x, py - 28, x, y + 28, branch.color, node.unlocked);
      }

      const prev = ni === 0 ? true : nodes[ni - 1].unlocked;
      const cls = node.unlocked ? 'unlocked' : (prev && G.sugar >= node.cost) ? 'available' : 'locked';

      const el = document.createElement('div');
      el.className = `skill-node ${cls}`;
      el.style.cssText = `left:${x - 28}px; top:${y - 28}px;`;
      el.innerHTML = `${node.name}<span class="cost">${node.unlocked ? '✓' : '🍬' + node.cost}</span>`;
      el.title = node.desc;
      if (!node.unlocked && prev) {
        el.onclick = () => buySkill(branch, bi, ni);
      }
      container.appendChild(el);
    });
  });
}

function drawLine(container, x1, y1, x2, y2, color, active) {
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx * dx + dy * dy);
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  const line = document.createElement('div');
  line.className = `skill-branch-line ${active ? 'active' : ''}`;
  line.style.cssText = `left:${x1}px; top:${y1}px; width:${len}px; height:4px; transform-origin: 0 50%; transform: rotate(${angle}deg); border-radius:2px;`;
  if (active) line.style.background = color;
  container.appendChild(line);
}

function buySkill(branch, bi, ni) {
  const node = branch.nodes[ni];
  if (node.unlocked) return;
  const prev = ni === 0 ? true : branch.nodes[ni - 1].unlocked;
  if (!prev || G.sugar < node.cost) return;
  G.sugar -= node.cost;
  node.unlocked = true;
  node.effect();
  renderSkillTree();
}

// ============ APHID MINIGAME (HTML OVERLAY - MOBILE FRIENDLY) ============
const aphidGame = { active: false, aphids: [], timer: 0, totalAphids: 0, remaining: 0 };
let aphidMeshes = []; // kept for compat but unused now

function startAphidMinigame() {
  aphidGame.active = true;
  aphidGame.timer = 10;
  aphidGame.aphids = [];
  const count = 5 + Math.floor(Math.random() * 4); // 5-8
  aphidGame.totalAphids = count;
  aphidGame.remaining = count;

  const overlay = document.getElementById('aphid-overlay');
  overlay.innerHTML = '';
  overlay.classList.add('active');

  const bugEmojis = ['🐛', '🪲', '🐜'];
  for (let i = 0; i < count; i++) {
    const sprite = document.createElement('div');
    sprite.className = 'aphid-sprite';
    sprite.textContent = bugEmojis[Math.floor(Math.random() * bugEmojis.length)];
    // Random screen position (avoid edges)
    const margin = 50;
    sprite.style.left = (margin + Math.random() * (window.innerWidth - margin * 2 - 44)) + 'px';
    sprite.style.top = (margin + Math.random() * (window.innerHeight - margin * 2 - 44)) + 'px';
    sprite.dataset.alive = 'true';
    sprite.dataset.driftX = (Math.random() - 0.5) * 60;
    sprite.dataset.driftY = (Math.random() - 0.5) * 40;
    sprite.dataset.phase = String(Math.random() * Math.PI * 2);

    sprite.addEventListener('click', (e) => {
      e.stopPropagation();
      if (sprite.dataset.alive !== 'true') return;
      sprite.dataset.alive = 'false';
      sprite.classList.add('squashed');
      sprite.textContent = '💥';
      aphidGame.remaining--;
      // Pop text
      const ft = document.createElement('div');
      ft.className = 'float-text';
      ft.textContent = '🐛💥';
      ft.style.left = e.clientX + 'px';
      ft.style.top = e.clientY + 'px';
      document.body.appendChild(ft);
      setTimeout(() => ft.remove(), 1000);
    });
    sprite.addEventListener('touchstart', (e) => {
      e.preventDefault();
      sprite.click();
    }, { passive: false });

    overlay.appendChild(sprite);
    aphidGame.aphids.push(sprite);
  }

  document.getElementById('aphid-timer').style.display = 'block';
  document.getElementById('aphid-count').style.display = 'block';
  document.getElementById('event-pill').style.display = 'block';
  document.getElementById('event-pill').textContent = '🐛 Aphid Attack! TAP THEM!';
  showEventBanner('aphid');
}

function updateAphidMinigame(dt) {
  aphidGame.timer -= dt;
  document.getElementById('aphid-timer').textContent = Math.ceil(Math.max(0, aphidGame.timer));
  document.getElementById('aphid-count').textContent = `🐛 ${aphidGame.remaining} aphids remaining`;

  // Animate aphid sprites — wander around screen
  aphidGame.aphids.forEach(sprite => {
    if (sprite.dataset.alive !== 'true') return;
    const phase = parseFloat(sprite.dataset.phase) + dt * 2;
    sprite.dataset.phase = String(phase);
    const driftX = parseFloat(sprite.dataset.driftX);
    const driftY = parseFloat(sprite.dataset.driftY);
    let x = parseFloat(sprite.style.left) + Math.sin(phase) * driftX * dt;
    let y = parseFloat(sprite.style.top) + Math.cos(phase * 0.7) * driftY * dt;
    // Keep on screen
    x = Math.max(10, Math.min(window.innerWidth - 54, x));
    y = Math.max(10, Math.min(window.innerHeight - 54, y));
    sprite.style.left = x + 'px';
    sprite.style.top = y + 'px';
  });

  if (aphidGame.remaining <= 0) {
    endAphidMinigame(true);
  } else if (aphidGame.timer <= 0) {
    endAphidMinigame(false);
  }
}

function endAphidMinigame(success) {
  aphidGame.active = false;
  // Clean up overlay
  const overlay = document.getElementById('aphid-overlay');
  overlay.classList.remove('active');
  overlay.innerHTML = '';
  aphidGame.aphids = [];

  document.getElementById('aphid-timer').style.display = 'none';
  document.getElementById('aphid-count').style.display = 'none';
  document.getElementById('event-pill').style.display = 'none';
  hideEventEffects();

  const resultEl = document.getElementById('aphid-result');
  resultEl.style.display = 'block';

  if (success) {
    resultEl.textContent = '✅ Aphids Cleared! Bonus!';
    resultEl.style.color = '#4CAF50';
    G.sugar += 20;
    G.totalSugar += 20;
    G.sugarThisCycle += 20;
  } else {
    resultEl.textContent = '💀 Aphids Win! -50% Sugar!';
    resultEl.style.color = '#ff4444';
    G.sugar = Math.floor(G.sugar * 0.5);
    G.aphidProductionMult = 0.5;
    G.aphidDamageCycles = 3;
    addLeafHoles();
  }

  setTimeout(() => { resultEl.style.display = 'none'; }, 1500);
}

// ============ EVENT VISUAL EFFECTS ============
let currentEventEffect = null;
let shakeInterval = null;

function showEventBanner(eventName) {
  const banner = document.getElementById('event-banner');
  const borderFx = document.getElementById('screen-border-effect');
  const rainbow = document.getElementById('rainbow-overlay');
  const sparkles = document.getElementById('sparkle-container');

  // Reset all
  hideEventEffects();

  banner.style.display = 'block';

  switch(eventName) {
    case 'aphid':
      banner.textContent = '🐛 APHID ATTACK!';
      banner.style.background = 'rgba(200,30,30,0.85)';
      // Red border pulse
      borderFx.style.display = 'block';
      borderFx.style.boxShadow = 'inset 0 0 60px rgba(255,0,0,0.5)';
      borderFx.style.animation = 'none';
      let pulseOn = true;
      currentEventEffect = setInterval(() => {
        pulseOn = !pulseOn;
        borderFx.style.boxShadow = pulseOn ? 'inset 0 0 60px rgba(255,0,0,0.5)' : 'inset 0 0 30px rgba(255,0,0,0.2)';
      }, 400);
      break;
    case 'pollinator':
      banner.textContent = '🐝 Pollinator Visit!';
      banner.style.background = 'rgba(200,170,30,0.85)';
      // Golden sparkles
      sparkles.style.display = 'block';
      sparkles.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = (20 + Math.random() * 60) + '%';
        s.style.top = (20 + Math.random() * 60) + '%';
        s.style.animationDelay = (Math.random() * 1) + 's';
        s.style.width = s.style.height = (6 + Math.random() * 8) + 'px';
        sparkles.appendChild(s);
      }
      break;
    case 'wind':
      banner.textContent = '💨 Strong Wind!';
      banner.style.background = 'rgba(100,150,200,0.85)';
      // Screen shake
      let shakeAmt = 0;
      shakeInterval = setInterval(() => {
        shakeAmt = 2 + Math.random() * 3;
        const sx = (Math.random() - 0.5) * shakeAmt;
        const sy = (Math.random() - 0.5) * shakeAmt;
        document.body.style.transform = `translate(${sx}px, ${sy}px)`;
      }, 50);
      currentEventEffect = shakeInterval;
      break;
    case 'rainbow':
      banner.textContent = '🌈 Rainbow!';
      banner.style.background = 'linear-gradient(90deg, rgba(255,0,0,0.7), rgba(255,165,0,0.7), rgba(255,255,0,0.7), rgba(0,128,0,0.7), rgba(0,0,255,0.7), rgba(75,0,130,0.7))';
      rainbow.style.display = 'block';
      break;
  }

  // Auto-hide banner after 3s but keep effects
  setTimeout(() => { banner.style.display = 'none'; }, 3000);
}

function hideEventEffects() {
  const banner = document.getElementById('event-banner');
  const borderFx = document.getElementById('screen-border-effect');
  const rainbow = document.getElementById('rainbow-overlay');
  const sparkles = document.getElementById('sparkle-container');

  banner.style.display = 'none';
  borderFx.style.display = 'none';
  rainbow.style.display = 'none';
  sparkles.style.display = 'none';
  sparkles.innerHTML = '';
  document.body.style.transform = '';

  if (currentEventEffect) { clearInterval(currentEventEffect); currentEventEffect = null; }
  if (shakeInterval) { clearInterval(shakeInterval); shakeInterval = null; }
}

function addLeafHoles() {
  if (!leafGroup) return;
  // Add dark spots to leaf mesh
  for (let i = 0; i < 5; i++) {
    const hole = new THREE.Mesh(
      new THREE.CircleGeometry(0.08 + Math.random() * 0.06, 8),
      new THREE.MeshBasicMaterial({ color: 0x1a0a00, side: THREE.DoubleSide })
    );
    hole.position.set((Math.random() - 0.5) * 0.5, (Math.random() - 0.3) * 0.7, 0.08);
    hole.userData.isHole = true;
    leafGroup.add(hole);
  }
}

function removeLeafHoles() {
  if (!leafGroup) return;
  for (let i = leafGroup.children.length - 1; i >= 0; i--) {
    if (leafGroup.children[i].userData && leafGroup.children[i].userData.isHole) {
      leafGroup.remove(leafGroup.children[i]);
    }
  }
}

// ============ SEASONAL COSMETICS ============
let seasonalObjects = [];
let seasonalBirds = [];

function clearSeasonalCosmetics() {
  seasonalObjects.forEach(obj => scene.remove(obj));
  seasonalObjects = [];
  seasonalBirds.forEach(b => scene.remove(b.mesh));
  seasonalBirds = [];
}

function spawnSeasonalCosmetics() {
  clearSeasonalCosmetics();
  const season = SEASONS[G.seasonIndex].name;

  if (season === 'spring') {
    // Flowers scattered on the ground
    const flowerColors = [0xff69b4, 0xff4500, 0xffff00, 0x9370db, 0xff1493, 0x00bfff];
    for (let i = 0; i < 40; i++) {
      const group = new THREE.Group();
      const x = (Math.random() - 0.5) * 60;
      const z = (Math.random() - 0.5) * 60;
      group.position.set(x, 0.05, z);
      // Petals
      const color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
      for (let p = 0; p < 5; p++) {
        const petal = new THREE.Mesh(
          new THREE.CircleGeometry(0.15 + Math.random() * 0.1, 6),
          new THREE.MeshLambertMaterial({ color, side: THREE.DoubleSide })
        );
        const angle = (p / 5) * Math.PI * 2;
        petal.position.set(Math.cos(angle) * 0.12, 0, Math.sin(angle) * 0.12);
        petal.rotation.x = -Math.PI / 2;
        group.add(petal);
      }
      // Center
      const center = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 6, 6),
        new THREE.MeshLambertMaterial({ color: 0xffdd00 })
      );
      center.position.y = 0.02;
      group.add(center);
      scene.add(group);
      seasonalObjects.push(group);
    }
  } else if (season === 'summer') {
    // Birds flying around
    for (let i = 0; i < 8; i++) {
      const bird = new THREE.Group();
      // Body
      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 5, 4),
        new THREE.MeshLambertMaterial({ color: Math.random() > 0.5 ? 0x333333 : 0x553322 })
      );
      bird.add(body);
      // Wings
      const wingGeo = new THREE.PlaneGeometry(0.4, 0.12);
      const wingMat = new THREE.MeshLambertMaterial({ color: 0x444444, side: THREE.DoubleSide });
      const lWing = new THREE.Mesh(wingGeo, wingMat);
      lWing.position.set(-0.2, 0, 0);
      lWing.userData.isWing = true;
      bird.add(lWing);
      const rWing = new THREE.Mesh(wingGeo, wingMat);
      rWing.position.set(0.2, 0, 0);
      rWing.userData.isWing = true;
      bird.add(rWing);

      bird.position.set(
        (Math.random() - 0.5) * 40,
        8 + Math.random() * 8,
        (Math.random() - 0.5) * 40
      );
      bird.userData = {
        angle: Math.random() * Math.PI * 2,
        radius: 10 + Math.random() * 15,
        speed: 0.3 + Math.random() * 0.5,
        height: bird.position.y,
        phase: Math.random() * Math.PI * 2,
        centerX: (Math.random() - 0.5) * 10,
        centerZ: (Math.random() - 0.5) * 10,
      };
      scene.add(bird);
      seasonalBirds.push({ mesh: bird });
    }
  } else if (season === 'fall') {
    // Pumpkins on the ground
    for (let i = 0; i < 20; i++) {
      const pumpkin = new THREE.Group();
      const x = (Math.random() - 0.5) * 50;
      const z = (Math.random() - 0.5) * 50;
      pumpkin.position.set(x, 0.25, z);
      const size = 0.2 + Math.random() * 0.2;
      const body = new THREE.Mesh(
        new THREE.SphereGeometry(size, 8, 6),
        new THREE.MeshLambertMaterial({ color: 0xff6600 })
      );
      body.scale.y = 0.75;
      pumpkin.add(body);
      // Stem
      const stem = new THREE.Mesh(
        new THREE.CylinderGeometry(0.03, 0.04, 0.12, 4),
        new THREE.MeshLambertMaterial({ color: 0x4a2e15 })
      );
      stem.position.y = size * 0.7;
      pumpkin.add(stem);
      scene.add(pumpkin);
      seasonalObjects.push(pumpkin);
    }
  } else if (season === 'winter') {
    // Snow covering ground - white patches
    for (let i = 0; i < 30; i++) {
      const snow = new THREE.Mesh(
        new THREE.CircleGeometry(1 + Math.random() * 2, 8),
        new THREE.MeshLambertMaterial({ color: 0xeeeeff, side: THREE.DoubleSide })
      );
      snow.rotation.x = -Math.PI / 2;
      snow.position.set((Math.random() - 0.5) * 60, 0.02, (Math.random() - 0.5) * 60);
      scene.add(snow);
      seasonalObjects.push(snow);
    }
  }
}

let lastSeasonForCosmetics = -1;

function updateSeasonalCosmetics(dt) {
  // Check if season changed
  if (G.seasonIndex !== lastSeasonForCosmetics) {
    lastSeasonForCosmetics = G.seasonIndex;
    spawnSeasonalCosmetics();
  }

  // Animate birds in summer
  seasonalBirds.forEach(b => {
    const ud = b.mesh.userData;
    ud.angle += ud.speed * dt;
    ud.phase += dt * 5;
    b.mesh.position.x = ud.centerX + Math.cos(ud.angle) * ud.radius;
    b.mesh.position.z = ud.centerZ + Math.sin(ud.angle) * ud.radius;
    b.mesh.position.y = ud.height + Math.sin(ud.phase * 0.3) * 0.5;
    b.mesh.rotation.y = ud.angle + Math.PI / 2;
    // Flap wings
    b.mesh.children.forEach(c => {
      if (c.userData && c.userData.isWing) {
        c.rotation.z = Math.sin(ud.phase) * 0.6;
      }
    });
  });
}

// ============ AMBIENT SOUND SYSTEM ============
let audioCtx = null;
let soundEnabled = false;
let ambientSources = {};
let currentSoundSeason = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // Mobile: resume on any user gesture
  if (audioCtx.state === 'suspended') {
    const resumeAudio = () => {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    };
    document.addEventListener('touchstart', resumeAudio, { once: true });
    document.addEventListener('click', resumeAudio, { once: true });
  }
}

function enableSound() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  soundEnabled = true;
  document.getElementById('sound-toggle').textContent = '🔊';
  document.getElementById('unmute-btn').style.display = 'none';
  updateAmbientSounds();
}

function toggleSound() {
  if (!audioCtx) initAudio();
  soundEnabled = !soundEnabled;
  document.getElementById('sound-toggle').textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled) {
    stopAllAmbient();
  } else {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    document.getElementById('unmute-btn').style.display = 'none';
    updateAmbientSounds();
  }
}

function stopAllAmbient() {
  Object.values(ambientSources).forEach(s => {
    try { s.source.stop(); } catch(e) {}
  });
  ambientSources = {};
  currentSoundSeason = null;
}

function createNoise(type, gain, filterFreq) {
  if (!audioCtx || !soundEnabled) return null;
  const bufferSize = audioCtx.sampleRate * 2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1);
  }
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;

  const filter = audioCtx.createBiquadFilter();
  filter.type = type || 'lowpass';
  filter.frequency.value = filterFreq || 400;

  const gainNode = audioCtx.createGain();
  gainNode.gain.value = gain || 0.02;

  source.connect(filter);
  filter.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  source.start();
  return { source, gain: gainNode, filter };
}

function createChirp(interval, gain) {
  if (!audioCtx || !soundEnabled) return null;
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0;
  gainNode.connect(audioCtx.destination);

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = 2000 + Math.random() * 2000;
  osc.connect(gainNode);
  osc.start();

  // Schedule chirps
  const chirpLoop = setInterval(() => {
    if (!soundEnabled) { clearInterval(chirpLoop); return; }
    const now = audioCtx.currentTime;
    const chirpGain = gain || 0.015;
    gainNode.gain.setValueAtTime(0, now);
    gainNode.gain.linearRampToValueAtTime(chirpGain, now + 0.02);
    gainNode.gain.linearRampToValueAtTime(0, now + 0.08);
    osc.frequency.setValueAtTime(2000 + Math.random() * 2500, now);
    osc.frequency.linearRampToValueAtTime(1500 + Math.random() * 1500, now + 0.06);
  }, interval + Math.random() * interval);

  return { source: osc, gain: gainNode, interval: chirpLoop };
}

function updateAmbientSounds() {
  if (!soundEnabled || !audioCtx) return;
  const season = SEASONS[G.seasonIndex].name;
  if (season === currentSoundSeason) return;
  stopAllAmbient();
  currentSoundSeason = season;

  if (season === 'spring') {
    ambientSources.wind = createNoise('lowpass', 0.01, 300);
    ambientSources.birds1 = createChirp(1500, 0.02);
    ambientSources.birds2 = createChirp(2200, 0.015);
    ambientSources.birds3 = createChirp(3000, 0.01);
    ambientSources.rustle = createNoise('bandpass', 0.008, 800);
  } else if (season === 'summer') {
    ambientSources.wind = createNoise('lowpass', 0.008, 250);
    ambientSources.birds1 = createChirp(1200, 0.025);
    ambientSources.birds2 = createChirp(1800, 0.02);
    ambientSources.birds3 = createChirp(2500, 0.015);
    ambientSources.birds4 = createChirp(3500, 0.01);
    ambientSources.rustle = createNoise('bandpass', 0.006, 700);
  } else if (season === 'fall') {
    ambientSources.wind = createNoise('lowpass', 0.025, 400);
    ambientSources.rustle = createNoise('bandpass', 0.015, 1000);
    ambientSources.birds1 = createChirp(4000, 0.008);
  } else if (season === 'winter') {
    ambientSources.wind = createNoise('lowpass', 0.035, 200);
    ambientSources.howl = createNoise('bandpass', 0.01, 150);
  }
}

// ============ CLICK ON 3D LEAF ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ============ INIT ============
initScene();

renderer.domElement.addEventListener('click', (e) => {
  if (!G.alive || !G.started) return;
  // During aphid minigame, don't trigger photosynthesis (aphids are HTML overlays)
  if (aphidGame.active) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObjects(leafGroup.children, true);
  if (hits.length > 0) doPhotosynthesis(e);
});
